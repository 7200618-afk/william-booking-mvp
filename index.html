<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>
  <style>

  </style>
</head>
<body>
  <div class="bsu-loading">Loading B SIDE U booking...</div>

  <script>
    (async function () {
      const sourceUrl = "https://raw.githubusercontent.com/7200618-afk/william-booking-mvp/41b5a444c3ada20bc9d620047297643db44dcc17/index.html";

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });
        if (!response.ok) throw new Error("Unable to load booking page.");

        let html = await response.text();

        const customCss = `
/* =========================================================

  /* Keep divider space, but make the visible line match the page background */
  .section-divider {

  .desktop-results-area {

  }
  .desktop-photo-wall-section {

    content: "" !important;

  .desktop-photo-wall-section .bsu-team-wall,

}

@media (max-width: 900px) {
  .pasadena-header {
    padding: 23px 24px 25px !important;
    border-radius: 26px !important;
  }

  }

  }

  }
  .pasadena-links {

`;

        const customJs = `
<script>
(function () {
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      var text = el.textContent || "";
      var newText = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();
      if (text !== newText) el.textContent = newText;
    });
  }
  function runFixes() { removeOpeningCounts(); }
  runFixes();
  setTimeout(runFixes, 100);
  setTimeout(runFixes, 300);
  setTimeout(runFixes, 700);
  setTimeout(runFixes, 1200);
  setTimeout(runFixes, 2500);
  var observer = new MutationObserver(runFixes);
  observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  document.addEventListener("click", function () {
    setTimeout(runFixes, 50);
    setTimeout(runFixes, 250);
    setTimeout(runFixes, 600);
  }, true);
})();
<\/script>
`;

        html = html.replace("</style>", "\n" + customCss + "\n</style>");
        html = html.replace("</body>", customJs + "\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
</body>
</html>
