<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Appointment</title>
</head>
<body>


<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'square market', sans-serif !important;
  }
  .content-wrapper {
    width: 100%;
    padding-left: 1px;
    padding-right: 1px;
    box-sizing: border-box;
    overflow-x: hidden;
    text-align: left;
  }

  .top-section {
    padding: 10px 0 8px 0;
    line-height: 1.35;
    text-align: left;
  }
  .top-section h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 6px 0;
    color: #111;
    letter-spacing: -0.2px;
  }
  .top-section .opening-time {
    font-size: 14px;
    color: #111;
    font-weight: 700;
    margin: 0 0 6px 0;
  }
  .top-section .description {
    font-size: 14px;
    color: #666;
    margin: 0 0 8px 0;
  }
  .top-section .phone-link{
    color: #111;
    text-decoration: underline;
    font-weight: 800;
  }
  .top-section .phone-link:active{ opacity: .8; }

  .top-section .address {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    font-size: 13px;
    line-height: 1.25;
    gap: 10px 14px;
    margin: 0;
  }
  .top-section .address-text {
    font-weight: 800;
    color: #111;
    white-space: nowrap;
  }
  .top-section .change-location {
    font-weight: 800;
    text-decoration: underline;
    color: #111;
    cursor: pointer;
    white-space: nowrap;
  }

  h2 {
    font-size: 18px;
    margin-top: 16px;
    margin-bottom: 10px;
    font-weight: 800;
    border-bottom: 1px solid #ccc;
    padding-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: space-between;
    text-align: left;
  }
  h2 a {
    text-decoration: none;
    color: #111;
  }

  .filter-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #pasadena-section .date-filter {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #pasadena-section .date-filter .date-nav {
    background: #000;
    color: #fff;
    border: 0;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
  }
  #pasadena-section .date-filter .date-nav:hover { background: #333; }
  #pasadena-section .date-filter .date-nav:focus-visible {
    outline: 2px solid rgba(0,0,0,.15);
    outline-offset: 2px;
  }

  #pasadena-section .date-display-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
  }

  #pasadena-section .date-display {
    background: transparent;
    border: 0;
    font-weight: 900;
    font-size: 15px;
    padding: 0 4px;
    line-height: 1;
    pointer-events: none;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    text-decoration: none !important;
  }

  #pasadena-section .date-display-wrap input[type="date"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    color: transparent !important;
    -webkit-text-fill-color: transparent;
    caret-color: transparent;
  }

  #pasadena-section .calendar-pop {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    padding: 8px;
    z-index: 50;
  }
  #pasadena-section .calendar-pop[hidden] { display: none; }
  #pasadena-section .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  #pasadena-section .cal-title { font-weight: 800; font-size: 13px; }
  #pasadena-section .cal-btn {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 0;
    background: #000;
    color: #fff;
    cursor: pointer;
    font-weight: 900;
  }
  #pasadena-section .cal-btn:hover { background: #333; }
  #pasadena-section .cal-dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }
  #pasadena-section .cal-dow div { text-align: center; font-size: 11px; color: #666; }
  #pasadena-section .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  #pasadena-section .cal-day {
    height: 28px;
    border-radius: 6px;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    border: 1px solid transparent;
  }
  #pasadena-section .cal-day:hover { background: #f4f4f4; }
  #pasadena-section .cal-day.today { border-color: #111; }
  #pasadena-section .cal-day.selected { background: #000; color: #fff; }

  .stylist-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    padding: 12px 0;
    box-sizing: border-box;
    width: 100%;
  }

  :root{
    --card-min-h: 172px;
  }

  .stylist-card,
  .giftcard-card {
    width: 100%;
    max-width: none;
    min-height: var(--card-min-h);
    background: #ffffff;
    border-radius: 8px;
    padding: 12px 10px 6px 10px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    box-shadow: none;
    border: 1px solid #eaeaea;
    text-align: center;
    position: relative;
    color: #222;
    overflow: visible;
    transition: background .22s ease, border-color .22s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: pan-y;
  }

  .stylist-card.card-active,
  .stylist-card:hover,
  .giftcard-card.card-active,
  .giftcard-card:hover {
    background: #fafafa;
    border-color: #d0d0d0;
  }

  .stylist-card:active,
  .giftcard-card:active {
    background: #f5f5f5;
    border-color: #c8c8c8;
  }

  .avatar-wrap {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    z-index: 5;
    pointer-events: none;
  }
  .avatar-wrap img,
  .avatar-wrap .letter-avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-origin: top center;
    transition:
      border-radius 0.35s cubic-bezier(.22,.61,.36,1),
      transform 0.35s cubic-bezier(.22,.61,.36,1);
  }
  .avatar-wrap .letter-avatar {
    font-weight: 700;
    font-size: 20px;
    background: #e3e3e3;
    color: #000;
    user-select: none;
  }

  .stylist-card { padding-top: 96px; }

  .stylist-card.card-active .avatar-wrap img,
  .stylist-card.card-active .avatar-wrap .letter-avatar,
  .stylist-card:hover .avatar-wrap img,
  .stylist-card:hover .avatar-wrap .letter-avatar {
    transform: scale(1.65);
    border-radius: 12px;
  }

  .giftcard-card { padding-top: 96px; }

  .giftcard-card .giftcard-avatar{
    position: absolute;
    top: 16px;
    left: 50%;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #f2f2f2;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    transform: translateX(-50%);
    transform-origin: top center;
    transition: transform .35s cubic-bezier(.22,.61,.36,1), border-radius .35s cubic-bezier(.22,.61,.36,1);
  }
  .giftcard-card .giftcard-avatar img{
    width: 70%;
    height: 70%;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
    display:block;
  }
  .giftcard-card.card-active .giftcard-avatar,
  .giftcard-card:hover .giftcard-avatar {
    transform: translateX(-50%) scale(1.65);
    border-radius: 12px;
  }

  .stylist-card .name-block {
    width: 100%;
    max-height: 44px;
    margin-bottom: 6px;
    text-align: center;
  }
  .stylist-card .name-main {
    font-weight: 800;
    font-size: 16px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: normal;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
    transition: opacity .22s ease, transform .22s ease;
  }

  .stylist-card .name-pill {
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translate(-50%, 6px);
    padding: 0;
    border-radius: 999px;
    background: transparent;
    color: #000;
    border: none;
    white-space: nowrap;
    max-width: 90%;
    overflow: visible;
    opacity: 0;
    z-index: 6;
    transition: opacity .22s ease, transform .22s ease;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    pointer-events: auto;
  }

  .book-profile-link {
    text-decoration: none;
    color: #000;
    font-weight: 800;
    font-size: 14px;
    padding: 3px 12px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .stylist-card.card-active .name-main,
  .stylist-card:hover .name-main,
  .giftcard-card.card-active .name-main,
  .giftcard-card:hover .name-main {
    opacity: 0;
    transform: translateY(4px);
  }

  .stylist-card.card-active .name-pill,
  .stylist-card:hover .name-pill,
  .giftcard-card.card-active .name-pill,
  .giftcard-card:hover .name-pill {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  .giftcard-card .name-main{
    font-weight: 800;
    font-size: 16px;
    margin-bottom: 6px;
    line-height: 1.4;
    width: 100%;
    text-align: center;
    transition: opacity .22s ease, transform .22s ease;
  }
  .giftcard-card .name-pill{
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translate(-50%, 6px);
    padding: 3px 12px;
    border-radius: 999px;
    background: transparent;
    color: #000;
    border: none;
    font-weight: 800;
    font-size: 14px;
    white-space: nowrap;
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    z-index: 3;
    transition: opacity .22s ease, transform .22s ease;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    pointer-events: none;
  }

  .stylist-card.not-today .name-not-today {
    font-weight: 800;
    font-size: 16px;
    margin-bottom: 4px;
    line-height: 1.4;
    width: 100%;
    text-align: center;
  }

  .stylist-card .bio,
  .giftcard-card .bio {
    font-size: 12px;
    color: #666;
    line-height: 1.35;
    height: 52px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    width: 100%;
    margin-bottom: 4px;
    position: relative;
    z-index: 2;
    transition: opacity .22s ease, transform .22s ease;
    text-align: center;
  }

  .stylist-card.card-active .bio,
  .stylist-card:hover .bio,
  .giftcard-card.card-active .bio,
  .giftcard-card:hover .bio{
    opacity: 0;
    transform: translateY(6px);
  }

  .stylist-card .avail,
  .giftcard-card .avail {
    font-size: 12px;
    font-weight: 800;
    color: #111;
    margin-top: 2px;
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .stylist-card.card-active,
  .stylist-card:hover,
  .giftcard-card.card-active,
  .giftcard-card:hover {
    background: transparent;
    border-color: transparent;
  }

  .on-vacation {
    position: absolute;
    top: 6px;
    right: 6px;
    background: black;
    color: white;
    padding: 2px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 800;
    user-select: none;
    z-index: 3;
  }

  .stylist-card .profile-bang {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 1px solid #000;
    background: #fff;
    font-size: 12px;
    font-weight: 900;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 7;
    transition: background .2s ease, color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .stylist-card .profile-bang:hover {
    background: #000;
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }

  .stylist-card .profile-bang--mobile {
    position: absolute;
    right: 8px;
    bottom: 10px;
  }
  .stylist-card .profile-bang--desktop { display: none; }

  .stylist-card.not-today {
    opacity: 0.5;
    pointer-events: none;
    cursor: default;
    background: #ffffff;
    border-radius: 8px;
    border: 1px solid #eaeaea;
    transition: none;
  }

  .section-label.rest {
    font-weight: 800;
    font-size: 14px;
    margin: 16px 0 8px 0;
    color: #666;
    grid-column: 1 / -1;
    background: #f9f9f9;
    padding: 6px 10px;
    border-radius: 6px;
  }

  .service-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    pointer-events: none;
  }
  .service-modal.is-open {
    display: block;
  }
  .service-modal__backdrop {
    position: absolute;
    inset: 0;
    background: transparent;
    pointer-events: auto;
  }
  .service-modal__dialog {
    position: fixed;
    width: min(420px, calc(100vw - 16px));
    background: #fff;
    border-radius: 18px;
    padding: 18px;
    box-sizing: border-box;
    box-shadow: 0 18px 40px rgba(0,0,0,.18);
    pointer-events: auto;
    transform: translate(-50%, -50%);
  }
  .service-modal__top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }
  .service-modal__title {
    font-size: 18px;
    font-weight: 800;
    color: #111;
    margin: 0;
  }
  .service-modal__close {
    width: 32px;
    height: 32px;
    border: 0;
    border-radius: 999px;
    background: #f3f3f3;
    color: #111;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }
  .service-modal__close:hover {
    background: #e9e9e9;
  }
  .service-modal__sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 14px;
  }
  .service-modal__list {
    display: grid;
    gap: 10px;
  }

  .service-modal__row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .service-modal__row .service-modal__item {
    min-width: 0;
  }

  .service-modal__row .service-modal__item-title,
  .service-modal__row .service-modal__item-meta {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .service-modal__item {
    width: 100%;
    text-decoration: none;
    border: 1px solid #e7e7e7;
    border-radius: 12px;
    padding: 12px 14px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: #111;
    background: #fff;
    transition: border-color .2s ease, background .2s ease, transform .2s ease;
  }
  .service-modal__item:hover {
    border-color: #111;
    background: #fafafa;
    transform: translateY(-1px);
  }
  .service-modal__item-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .service-modal__item-title {
    font-size: 14px;
    font-weight: 800;
    color: #111;
  }
  .service-modal__item-meta {
    font-size: 12px;
    color: #666;
  }
  .service-modal__item-arrow {
    font-size: 16px;
    font-weight: 900;
    color: #111;
    flex: 0 0 auto;
  }
  .service-modal__footer {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  .service-modal__profile {
    width: 100%;
    text-decoration: none;
    border: 1px solid #111;
    border-radius: 12px;
    padding: 12px 14px;
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #111;
    background: #fff;
    font-size: 14px;
    font-weight: 800;
    transition: background .2s ease, color .2s ease, transform .2s ease;
  }
  .service-modal__profile:hover {
    background: #111;
    color: #fff;
    transform: translateY(-1px);
  }

  @media (min-width: 769px) {
    .content-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .stylist-card .profile-bang--desktop { display: flex; }
    .stylist-card .profile-bang--mobile { display: none; }
  }

  @media (max-width: 768px) {
    .content-wrapper {
      padding-left: 8px !important;
      padding-right: 8px !important;
      max-width: 100vw;
      overflow-x: hidden;
      text-align: left;
    }

    .top-section .address{
      gap: 8px 14px !important;
      justify-content: flex-start !important;
      align-items: center !important;
    }
    .top-section .address-text{
      width: 100% !important;
      white-space: normal !important;
    }
    .top-section .change-location{
      display: inline-flex !important;
      width: auto !important;
      margin-left: 0 !important;
      text-align: left !important;
    }

    .stylist-grid {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 12px !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
      box-sizing: border-box;
      overflow-x: hidden;
      justify-content: start !important;
    }
    .stylist-card,
    .giftcard-card {
      max-width: 100%;
      min-height: 166px !important;
    }

    .stylist-card .profile-bang--mobile {
      top: 8px;
      right: 8px;
      bottom: auto;
      width: 16px;
      height: 16px;
      font-size: 11px;
    }

    .service-modal__dialog {
      width: calc(100vw - 16px) !important;
      max-width: 420px;
      padding: 16px;
      border-radius: 16px;
    }
  }
</style>

<div class="content-wrapper">
  <div class="top-section">
    <h1>Have a Good Hair Day</h1>
    <p id="opening-time" class="opening-time">Loading...</p>
    <p class="description">Get a haircut that suits your hair type, lifestyle, and look.</p>
    <p class="address">
      <span class="address-text">350 S Lake Ave Ste 115, Pasadena, CA 91101</span>
      <a
        href="https://www.google.com/maps/dir/?api=1&destination=350+Shoppers+Ln,+Pasadena,+CA+91101"
        class="change-location"
        title="parking 导航"
        target="_blank"
        rel="noopener noreferrer"
      >
        Parking Direction
      </a>
      <a
        href="https://bsideuhair.com/appointment-sangabriel"
        class="change-location"
        target="_blank"
        rel="noopener noreferrer"
      >
        Switch to San Gabriel
      </a>
    </p>
  </div>

  <div id="pasadena-section">
    <h2>
      <a
        href="https://www.google.com/maps/dir/?api=1&destination=350+S+Lake+Ave+Ste+115,+Pasadena,+CA+91101"
        target="_blank"
        rel="noopener noreferrer"
      >Pasadena</a>

      <div class="filter-wrap">
        <div class="date-filter">
          <button id="prev-day" class="date-nav" aria-label="Previous Day">‹</button>

          <div class="date-display-wrap" id="date-wrap">
            <button id="day-display-btn" class="date-display" type="button" aria-label="Pick a date">Today</button>
            <input id="date-picker" type="date" aria-label="Pick a date" />
            <div id="calendar-pop" class="calendar-pop" hidden aria-hidden="true"></div>
          </div>

          <button id="next-day" class="date-nav" aria-label="Next Day">›</button>
        </div>
      </div>
    </h2>

    <div class="stylist-grid" id="pasadena-grid"></div>
  </div>
</div>

<div id="service-modal" class="service-modal" aria-hidden="true">
  <div class="service-modal__backdrop" data-close-modal="true"></div>
  <div class="service-modal__dialog" id="service-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="service-modal-title">
    <div class="service-modal__top">
      <h3 id="service-modal-title" class="service-modal__title">Choose a Service</h3>
      <button type="button" class="service-modal__close" id="service-modal-close" aria-label="Close">×</button>

    function toIsoDateLocal(date){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;

    function hashStringToInt(str){
      let h = 2166136261;
      for(let i=0;i<str.length;i++){
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }
    function mulberry32(a){
      return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
    }
    function seededShuffle(arr, seedKey){
      const a = arr.slice();
      const rand = mulberry32(hashStringToInt(seedKey));
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(rand() * (i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;

    function ymdFromParts(y,m,d){ return new Date(y,m,d); }
    function sameYMD(date, parts){ return date.getFullYear()===parts.y && date.getMonth()===parts.m && date.getDate()===parts.d; }
    function isWithinRange(date, startParts, endParts){
      const dt = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
      const st = ymdFromParts(startParts.y, startParts.m, startParts.d).getTime();
      const ed = ymdFromParts(endParts.y, endParts.m, endParts.d).getTime();
      return dt >= st && dt <= ed;
    }
    function isOnVacation(name, date){
      const ranges = vacations[name];
      if(!ranges || !ranges.length) return false;
      return ranges.some(r => isWithinRange(date, r.start, r.end));
    }
    function isClosure(date){
      return closuresDates.some(c => sameYMD(date, c));
    }
    function matchesParts(date, parts){
      return date.getFullYear()===parts.y && date.getMonth()===parts.m && date.getDate()===parts.d;
    }
    function hasExtraShift(name, date){
      const list = extraShifts[name] || [];
      return list.some(p => matchesParts(date, p));
    }
    function isDayOffOverride(name, date){
      const list = dayOffOverrides[name] || [];
      return list.some(p => matchesParts(date, p));
    }

    function hasStarted(name, date){
      const start = startDates[name];
      if(!start) return true;
      const dt = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
      const st = ymdFromParts(start.y, start.m, start.d).getTime();
      return dt >= st;
    }

    function effectiveDaysFor(name, baseDays, date){
      const fs = futureSchedules[name];
      if(!fs) return baseDays;

      const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());

      if (Array.isArray(fs)) {
        let chosen = null;
        fs.forEach(schedule => {
          const start = new Date(schedule.start.y, schedule.start.m, schedule.start.d);
          if (day.getTime() >= start.getTime()) {
            if (!chosen || start.getTime() > new Date(chosen.start.y, chosen.start.m, chosen.start.d).getTime()) {
              chosen = schedule;
            }
          }
        });
        return chosen ? chosen.days : baseDays;
      } else {
        const start = new Date(fs.start.y, fs.start.m, fs.start.d);
        if (day.getTime() >= start.getTime()) return fs.days;
        return baseDays;
      }
    }

    function getActiveVacationText(name, date){
      const ranges = vacations[name] || [];
      const active = ranges.find(r => isWithinRange(date, r.start, r.end));
      if(!active) return '';
      const {start,end} = active;
      const sameYear = start.y===end.y;
      const sameMonth = sameYear && start.m===end.m;
      const sMonth = MONTHS[start.m], eMonth = MONTHS[end.m];
      if(sameYear){
        if(sameMonth) return `${sMonth} ${start.d}–${end.d}`;
        return `${sMonth} ${start.d}–${eMonth} ${end.d}`;
      }
      return `${sMonth} ${start.d}, ${start.y}–${eMonth} ${end.d}, ${end.y}`;
    }

    function worksOnDate(stylist, date){
      if(isClosure(date)) return false;
      if(!hasStarted(stylist.name, date)) return false;
      if(isOnVacation(stylist.name, date)) return false;
      if(isDayOffOverride(stylist.name, date)) return false;

      const baseDays = (stylist.days||'').split(',').map(d=>d.trim()).filter(Boolean);
      const effDaysString = effectiveDaysFor(stylist.name, baseDays.join(','), date);
      const effDays = effDaysString ? effDaysString.split(',').map(s=>s.trim()) : [];
      const scheduled = effDays.includes(daysShort[date.getDay()]);
      const extra = hasExtraShift(stylist.name, date);
      return scheduled || extra;
    }

    function getNextWorkingDate(stylist, fromDate){
      for(let i=1;i<=60;i++){
        const d=new Date(fromDate);
        d.setDate(d.getDate()+i);
        if(worksOnDate(stylist,d)) return d;
      }
      return null;
    }

    function getAvatarHTML(stylist){

    function getServiceMeta(name, serviceKey){

        else if(info.price) base = `$${info.price}`;
        else if(info.minutes) base = `${info.minutes}min`;
      }

      if (serviceKey === 'haircut') {
        return base ? `${base} • fade , taper,clipper + scissors top` : 'fade,  taper, clipper + scissors top';
      }

      if (serviceKey === 'scissors') {
        return base ? `${base} •  layers, curtain, mullet, longer styles` : ' layers, curtain, mullet,  longer styles';
      }

      if (serviceKey === 'covergray') {
        return base ? `${base} • gray coverage color` : 'gray coverage color';
      }

      return base;
    }

    let modalClosing = false;

    function clearCardStates(preserveActiveModalCard){
      document.querySelectorAll('.stylist-card.card-active, .giftcard-card.card-active').forEach(el=>{
        if (preserveActiveModalCard && activeModalCard === el) return;
        el.classList.remove('card-active');

      document.querySelectorAll('.profile-bang, .book-profile-link').forEach(el=>{
        if(typeof el.blur === 'function') el.blur();

      if(document.activeElement && typeof document.activeElement.blur === 'function'){
        document.activeElement.blur();

    function positionModalNearCard(cardEl){
      if (!isMobileView()) {
        modalDialog.style.left = '50%';
        modalDialog.style.top = '50%';
        return;
      }

      if(!cardEl) {
        modalDialog.style.left = '50%';
        modalDialog.style.top = '50%';
        return;
      }

      const margin = 8;
      const frame = document.querySelector('.content-wrapper');
      const frameRect = frame ? frame.getBoundingClientRect() : {
        left: 0,
        right: window.innerWidth,
        top: 0,
        bottom: window.innerHeight
      };

      modalDialog.style.left = '0px';
      modalDialog.style.top = '0px';

      const dialogRect = modalDialog.getBoundingClientRect();
      const dialogW = dialogRect.width;
      const dialogH = dialogRect.height;
      const cardRect = cardEl.getBoundingClientRect();

      let centerX = cardRect.left + (cardRect.width / 2);
      let centerY = cardRect.top + (cardRect.height / 2);

      const minCenterX = frameRect.left + margin + (dialogW / 2);
      const maxCenterX = frameRect.right - margin - (dialogW / 2);

      if (centerX < minCenterX) centerX = minCenterX;
      if (centerX > maxCenterX) centerX = maxCenterX;

      const cardTopMinCenterY = cardRect.top + (dialogH / 2);
      if (centerY < cardTopMinCenterY) centerY = cardTopMinCenterY;

      const minCenterY = margin + (dialogH / 2);
      const maxCenterY = window.innerHeight - margin - (dialogH / 2);

      if (centerY < minCenterY) centerY = minCenterY;
      if (centerY > maxCenterY) centerY = maxCenterY;

      modalDialog.style.left = `${Math.round(centerX)}px`;
      modalDialog.style.top = `${Math.round(centerY)}px`;
    }

    function openServiceModal(stylist, cardEl){

      const links = bookingLinks[stylist.name];
      const serviceOrder = ['haircut','scissors','covergray','perm','balayage','bleach','color'];
      const available = serviceOrder.filter(key => !!links[key]);

      modalTitle.textContent = `Book ${stylist.name}`;
      modalSub.textContent = 'Select a service to continue booking.';
      function buildServiceItem(key) {
        const meta = getServiceMeta(stylist.name, key);
        return `
          <a class="service-modal__item" href="${links[key]}" target="_blank" rel="noopener noreferrer">
            <span class="service-modal__item-left">
              <span class="service-modal__item-title">${serviceLabelMap[key] || key}</span>
              ${meta ? `<span class="service-modal__item-meta">${meta}</span>` : ``}
            </span>
            <span class="service-modal__item-arrow">›</span>
          </a>
        `;
      }

      const modalItems = [];
      let permColorGrouped = false;

      available.forEach(key => {
        if (
          stylist.name === 'Fiona' &&
          !permColorGrouped &&
          links.perm &&
          links.color &&
          (key === 'perm' || key === 'color')
        ) {
          modalItems.push(`
            <div class="service-modal__row">
              ${buildServiceItem('perm')}
              ${buildServiceItem('color')}
            </div>
          `);
          permColorGrouped = true;
          return;
        }

        if (
          stylist.name === 'Fiona' &&
          permColorGrouped &&
          (key === 'perm' || key === 'color')
        ) {
          return;
        }

        modalItems.push(buildServiceItem(key));
      });

      modalList.innerHTML = modalItems.join('');

      modalProfile.href = getProfileUrl(stylist.name);

      modal.classList.add('is-open');
      modal.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';

      requestAnimationFrame(() => {
        positionModalNearCard(activeModalCard);
      });
    }

    function closeServiceModal(){
      modalClosing = true;
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';

      setTimeout(() => {
        if (activeModalCard) {
          activeModalCard.classList.remove('card-active');
          activeModalCard = null;

        clearCardStates(false);
      }, 0);

    function attachCardInteractions(card, stylist){
      if(!card || !stylist) return;

      const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      let startX = 0;
      let startY = 0;
      let moved = false;
      const MOVE_THRESHOLD = 14;

      card.addEventListener('click', function(e){
        if (modalClosing) return;
        if(e.target.closest('.book-profile-link')) return;
        if(e.target.closest('.profile-bang')) return;
        openServiceModal(stylist, card);
      });

      if(isTouch){
        card.addEventListener('touchstart', function(e){
          if (e.target.closest('.book-profile-link')) return;
          if (e.target.closest('.profile-bang')) return;
          if (!e.touches || !e.touches.length) return;

          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
          moved = false;

          clearCardStates(false);
          card.classList.add('card-active');
        }, { passive: true });

        card.addEventListener('touchmove', function(e){
          if (!e.touches || !e.touches.length) return;
          const dx = Math.abs(e.touches[0].clientX - startX);
          const dy = Math.abs(e.touches[0].clientY - startY);

          if (dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD) {
            moved = true;
            if (activeModalCard !== card) card.classList.remove('card-active');
          }
        }, { passive: true });

        card.addEventListener('touchend', function(e){
          if (modalClosing) return;
          if (e.target.closest('.book-profile-link')) return;
          if (e.target.closest('.profile-bang')) return;

          if (moved) {
            if (activeModalCard !== card) card.classList.remove('card-active');
            return;
          }

          e.preventDefault();
          e.stopPropagation();
          openServiceModal(stylist, card);
        });

        card.addEventListener('touchcancel', function(){
          if (activeModalCard !== card) card.classList.remove('card-active');
        }, { passive: true });
      }
    }

    function renderCards(){
      const grid = document.getElementById('pasadena-grid');
      if(!grid) return;
      grid.innerHTML = '';

      const seedKey = toIsoDateLocal(currentDate);
      let pasadenaStylists = stylists.filter(s => s.location==='Pasadena');

      let workingToday = pasadenaStylists.filter(s => worksOnDate(s, currentDate));
      const notWorkingToday = pasadenaStylists.filter(s => !worksOnDate(s, currentDate));

      const isSunday = (currentDate.getDay() === 0);
      let orderedWorking = [];

      if(isSunday){
        const take = (name)=>{
          const idx = workingToday.findIndex(x=>x.name===name);
          if(idx>=0){ const n = workingToday.splice(idx,1)[0]; orderedWorking.push(n); }
        };
        take('Ken');
      }

      const takeByName = (list, name) => {
        const idx = list.findIndex(x => x && x.name === name);
        return idx>=0 ? list.splice(idx,1)[0] : null;
      };

      const ken   = takeByName(workingToday,'Ken');
      const fiona = takeByName(workingToday,'Fiona');
      const nami  = takeByName(workingToday,'Nami');
      const jacob = takeByName(workingToday,'Jacob');

      const kGroup  = seededShuffle([ken].filter(Boolean), seedKey + '|k');
      const fnGroup = seededShuffle([fiona,nami].filter(Boolean), seedKey + '|fn');
      const others  = seededShuffle(workingToday.slice(), seedKey + '|others');

      orderedWorking = orderedWorking.concat(kGroup, fnGroup, others);

      const priorityNames = ['William','Ryan'];
      priorityNames.slice().reverse().forEach(name => {
        const idx = orderedWorking.findIndex(s => s && s.name === name);
        if(idx > 0){
          const stylist = orderedWorking.splice(idx, 1)[0];
          orderedWorking.unshift(stylist);
        }
      });

      if(jacob) orderedWorking.push(jacob);
      orderedWorking.push(giftCardObj);

      orderedWorking.forEach(stylist=>{
        if(stylist && stylist.isGift){
          const wrapper=document.createElement('a');
          wrapper.href=personalLinks['Gift Card'];
          wrapper.target="_blank";
          wrapper.rel="noopener noreferrer";
          wrapper.style.all='unset';
          wrapper.style.cursor='pointer';
          wrapper.style.display='flex';
          wrapper.style.flexDirection='column';
          wrapper.style.alignItems='center';

          const card=document.createElement('div');
          card.className='giftcard-card';
          card.innerHTML=`
            <div class="giftcard-avatar" aria-hidden="true">
              <img src="${GIFT_LOGO_URL}" alt="Gift Card Icon" loading="lazy">
            </div>
            <div class="name-main">Gift Card</div>
            <div class="name-pill">Gift Card</div>
            <div class="bio">Perfect gift for any occasion</div>
          `;
          wrapper.appendChild(card);

          if(isTouchDevice){
            wrapper.addEventListener('touchstart', function(){
              card.classList.add('card-active');
            }, {passive:true});
            wrapper.addEventListener('touchend', function(){
              setTimeout(()=>card.classList.remove('card-active'), 180);
            }, {passive:true});
            wrapper.addEventListener('touchcancel', function(){
              card.classList.remove('card-active');
            }, {passive:true});
          }

          grid.appendChild(wrapper);
          return;
        }
        if(!stylist) return;

        const onVacation = isOnVacation(stylist.name, currentDate);
        const vacText = onVacation ? getActiveVacationText(stylist.name, currentDate) : '';
        const profileUrl = getProfileUrl(stylist.name);
        const showProfileBang = true;

        const card=document.createElement('div');
        card.className='stylist-card';
        card.setAttribute('data-stylist-name', stylist.name);

        card.innerHTML = `
          ${onVacation ? `<div class="on-vacation" title="On vacation: ${vacText}" aria-label="On vacation: ${vacText}">On Vacation · ${vacText}</div>` : ''}
          ${getAvatarHTML(stylist)}
          <div class="name-block">
            <div class="name-main">${stylist.name}</div>
          </div>
          <div class="name-pill">
            <a class="book-profile-link" href="${profileUrl}" target="_blank" rel="noopener noreferrer">Book Now</a>
            ${showProfileBang ? `<button class="profile-bang profile-bang--desktop" type="button" aria-label="Explore ${stylist.name}'s style">!</button>` : ``}
          </div>
          <div class="bio">${bios[stylist.name] || ''}</div>
          ${showProfileBang ? `<button class="profile-bang profile-bang--mobile" type="button" aria-label="Explore ${stylist.name}'s style">!</button>` : ``}
        `;

        attachCardInteractions(card, stylist);

        const bookLink = card.querySelector('.book-profile-link');
        if(bookLink){
          bookLink.addEventListener('click', function(e){
            e.stopPropagation();
          });
        }

        if(showProfileBang){
          const profileBtns = card.querySelectorAll('.profile-bang');
          profileBtns.forEach(btn => {
            btn.addEventListener('click', function(e){
              e.stopPropagation();
              e.preventDefault();
              const url = getProfileUrl(stylist.name);
              if (url) window.open(url, '_blank', 'noopener');
            });
          });
        }

        grid.appendChild(card);
      });

      if(notWorkingToday.length>0){
        const restTitle=document.createElement('div');
        restTitle.className='section-label rest';
        restTitle.textContent='Not Working Today';
        grid.appendChild(restTitle);

        notWorkingToday.forEach(stylist=>{
          const onVacation = isOnVacation(stylist.name, currentDate);
          const vacText = onVacation ? getActiveVacationText(stylist.name, currentDate) : '';
          const nextDate = getNextWorkingDate(stylist, currentDate);
          const availText = nextDate ? `Available ${fmtAvailDate(nextDate)}` : 'No upcoming availability';

          const card=document.createElement('div');
          card.className='stylist-card not-today';
          card.innerHTML = `
            ${onVacation ? `<div class="on-vacation" title="On vacation: ${vacText}" aria-label="On vacation: ${vacText}">On Vacation · ${vacText}</div>` : ''}
            ${getAvatarHTML(stylist)}
            <div class="name-not-today">${stylist.name}</div>
            <div class="avail">${availText}</div>
          `;
          grid.appendChild(card);
        });
      }
    }

    const dayDisplayBtn = document.getElementById('day-display-btn');
    const datePicker    = document.getElementById('date-picker');
    const calPop        = document.getElementById('calendar-pop');
    const dateWrap      = document.getElementById('date-wrap');

    function updateDayDisplay(){
      datePicker.value = toIsoDateLocal(currentDate);
      dayDisplayBtn.textContent = formatDowMd(currentDate);
    }

    const probe = document.createElement('input');
    probe.setAttribute('type','date');
    const typeIsDate = (probe.type === 'date');
    const usePolyfill = !typeIsDate;

    function buildCalendar(viewDate){
      calPop.innerHTML='';
      const y=viewDate.getFullYear(), m=viewDate.getMonth();

      const header=document.createElement('div'); header.className='cal-header';
      const prev=document.createElement('button'); prev.className='cal-btn'; prev.textContent='‹';
      const next=document.createElement('button'); next.className='cal-btn'; next.textContent='›';
      const title=document.createElement('div'); title.className='cal-title'; title.textContent=`${MONTHS[m]} ${y}`;
      header.appendChild(prev); header.appendChild(title); header.appendChild(next);

      const dow=document.createElement('div'); dow.className='cal-dow';
      ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{ const el=document.createElement('div'); el.textContent=d; dow.appendChild(el); });

      const grid=document.createElement('div'); grid.className='cal-grid';
      const first=new Date(y,m,1); const startDay=first.getDay(); const daysInMonth=new Date(y,m+1,0).getDate();
      const today=new Date(); today.setHours(0,0,0,0);
      const selected=new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());

      for(let i=0;i<startDay;i++){ grid.appendChild(document.createElement('div')); }
      for(let d=1; d<=daysInMonth; d++){
        const cell=document.createElement('div'); cell.className='cal-day'; cell.textContent=d;
        const cellDate=new Date(y,m,d);
        const c=new Date(cellDate.getFullYear(), cellDate.getMonth(), cellDate.getDate());
        if(c.getTime()===today.getTime()) cell.classList.add('today');
        if(c.getTime()===selected.getTime()) cell.classList.add('selected');
        cell.addEventListener('click',()=>{
          currentDate=new Date(y,m,d);
          updateDayDisplay();
          renderCards();
          closeCalendar();
          closeServiceModal();
        });
        grid.appendChild(cell);
      }
      prev.addEventListener('click',(e)=>{ e.stopPropagation(); buildCalendar(new Date(y, m-1, 1)); });
      next.addEventListener('click',(e)=>{ e.stopPropagation(); buildCalendar(new Date(y, m+1, 1)); });

      calPop.appendChild(header); calPop.appendChild(dow); calPop.appendChild(grid);
    }
    function openCalendar(){ buildCalendar(currentDate); calPop.hidden=false; calPop.setAttribute('aria-hidden','false'); }
    function closeCalendar(){ calPop.hidden=true; calPop.setAttribute('aria-hidden','true'); }

    updateDayDisplay();

    const onDateChange = ()=>{
      if(!datePicker.value) return;
      currentDate = fromIsoDateLocal(datePicker.value);
      updateDayDisplay();
      renderCards();
      clearCardStates(false);
      if (modal.classList.contains('is-open')) closeServiceModal();
    };
    datePicker.addEventListener('change', onDateChange);
    datePicker.addEventListener('input', onDateChange);

    if(usePolyfill){
      datePicker.style.pointerEvents='none';
      dateWrap.addEventListener('click',(e)=>{ e.stopPropagation(); if(calPop.hidden) openCalendar(); else closeCalendar(); });
      document.addEventListener('click',(e)=>{ if(!calPop.hidden && !dateWrap.contains(e.target)) closeCalendar(); });
      document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeCalendar(); });
    }

    document.getElementById('prev-day').onclick = ()=>{
      currentDate.setDate(currentDate.getDate()-1);
      updateDayDisplay();
      renderCards();
      clearCardStates(false);
      if (modal.classList.contains('is-open')) closeServiceModal();
    };
    document.getElementById('next-day').onclick = ()=>{
      currentDate.setDate(currentDate.getDate()+1);
      updateDayDisplay();
      renderCards();
      clearCardStates(false);
      if (modal.classList.contains('is-open')) closeServiceModal();
    };

    const daysFull = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const now = new Date();
    const nowHour = now.getHours();
    const todayIndex = now.getDay();
    const isIndependenceDay = (now.getMonth()===6 && now.getDate()===4);
    const todayClosure = closuresDates.find(c => sameYMD(now, c));
    let displayText='';
    const phoneHTML = `<a class="phone-link" href="tel:${PHONE_TEL}">${PHONE_TEXT}</a>`;

    if(todayClosure) displayText = todayClosure.label;
    else if(isIndependenceDay) displayText="Closed for Independence Day 🇺🇸";
    else if(nowHour>=18) displayText=`Opening ${daysFull[(todayIndex+1)%7]} 10:00 am • ${phoneHTML}`;
    else if(nowHour>=10) displayText=`Open • ${phoneHTML}`;
    else displayText=`Opening ${daysFull[todayIndex]} 10:00 am • ${phoneHTML}`;

    openingTimeElement.innerHTML = displayText;

    renderCards();
    clearCardStates(false);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
