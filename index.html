      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `

        const customJs = `
<script>
(function () {
  const HEADER_HTML = \`
    <div class="bsu-redesigned-header">
      <div class="bsu-redesigned-header-inner">
        <h1 class="bsu-redesigned-title">B SIDE U - Pasadena</h1>

        <div class="bsu-redesigned-meta">
          <div class="bsu-redesigned-status">Open today until 7:00 PM</div>

          <div class="bsu-redesigned-address">
            350 S Lake Ave Ste 115, Pasadena, CA 91101
          </div>

          <div class="bsu-redesigned-actions">
            <a class="bsu-redesigned-button" href="https://www.google.com/maps/search/?api=1&query=350%20S%20Lake%20Ave%20Ste%20115%2C%20Pasadena%2C%20CA%2091101" target="_blank" rel="noopener">
              Parking / Direction
            </a>

            <a class="bsu-redesigned-button" href="https://www.bsideuhair.com/san-gabriel">
              Switch to San Gabriel
            </a>
          </div>
        </div>
      </div>
    </div>
  \`;

  function normalizeText(str) {
    return String(str || "").replace(/\\s+/g, " ").trim().toLowerCase();
  }

  function findOriginalHeaderCard() {
    const all = Array.from(document.querySelectorAll("body *"));

    const titleEl = all.find(function (el) {
      const text = normalizeText(el.textContent);
      const ownText = normalizeText(Array.from(el.childNodes)
        .filter(function (n) { return n.nodeType === Node.TEXT_NODE; })
        .map(function (n) { return n.textContent; })
        .join(" "));

      return ownText === "b side u - pasadena" ||
             ownText === "bsideu - pasadena" ||
             text === "b side u - pasadena" ||
             text === "bsideu - pasadena";
    });

    if (!titleEl) return null;

    let node = titleEl;

    while (node && node !== document.body) {
      const rect = node.getBoundingClientRect();
      const text = normalizeText(node.textContent);

      const isWideCard = rect.width > window.innerWidth * 0.55;
      const hasAddress = text.includes("350 s lake") || text.includes("pasadena, ca 91101");
      const hasParking = text.includes("parking") || text.includes("direction");
      const notTooTall = rect.height < 340;

      if (isWideCard && notTooTall && (hasAddress || hasParking)) {
        return node;
      }

      node = node.parentElement;
    }

    return titleEl.parentElement;
  }

  function rebuildHeader() {
    if (document.querySelector(".bsu-redesigned-header")) return;

    const card = findOriginalHeaderCard();
    if (!card) return;

    card.innerHTML = HEADER_HTML;
    card.style.padding = "0";
    card.style.border = "0";
    card.style.background = "transparent";
    card.style.boxShadow = "none";
    card.style.overflow = "visible";
  }

  function runManyTimes() {
    rebuildHeader();
    setTimeout(rebuildHeader, 100);
    setTimeout(rebuildHeader, 300);
    setTimeout(rebuildHeader, 700);
    setTimeout(rebuildHeader, 1200);
    setTimeout(rebuildHeader, 2000);
    setTimeout(rebuildHeader, 3500);
  }

  runManyTimes();

  const headerObserver = new MutationObserver(function () {
    rebuildHeader();
  });

  headerObserver.observe(document.body, {
    childList: true,
    subtree: true
  });

  window.addEventListener("load", runManyTimes);
  window.addEventListener("resize", runManyTimes);

  /* Remove Morning · 2 openings / Afternoon · 1 opening */
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      let text = el.textContent || "";

      text = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (el.textContent !== text) {
        el.textContent = text;
      }
    });
  }

  function startOpeningCountCleaner() {
    removeOpeningCounts();

    setTimeout(removeOpeningCounts, 100);
    setTimeout(removeOpeningCounts, 300);
    setTimeout(removeOpeningCounts, 700);
    setTimeout(removeOpeningCounts, 1200);

    const observer = new MutationObserver(function () {
      removeOpeningCounts();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });

    document.addEventListener("click", function () {
      setTimeout(removeOpeningCounts, 50);
      setTimeout(removeOpeningCounts, 250);
      setTimeout(removeOpeningCounts, 600);
    }, true);
  }

  startOpeningCountCleaner();
})();
<\\/script>
`;

        html = html.replace("</style>", "\\n" + customCss + "\\n</style>");
        html = html.replace("</body>", customJs + "\\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
