<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    html,
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .bsu-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="bsu-loading">Loading B SIDE U booking...</div>

  <script>
    (async function () {
      const sourceUrl =
        "https://raw.githubusercontent.com/7200618-afk/william-booking-mvp/41b5a444c3ada20bc9d620047297643db44dcc17/index.html";

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `
/* ===============================
   B SIDE U Custom Header Redesign
   =============================== */

/* Remove View Profile under staff avatars */
.profile-link-under-card,
.staff-item.is-active .profile-link-under-card {
  display: none !important;
}

/* New Pasadena hero header */
.bsu-custom-hero {
  width: 100% !important;
  max-width: 100% !important;
  border: 1px solid rgba(20, 20, 20, 0.08) !important;
  border-radius: 32px !important;
  background: #fff !important;
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.04) !important;
  padding: 34px 42px 34px !important;
  box-sizing: border-box !important;
  position: relative !important;
  overflow: hidden !important;
}

.bsu-custom-hero::after {
  content: "" !important;
  position: absolute !important;
  right: -38px !important;
  bottom: -54px !important;
  width: 190px !important;
  height: 190px !important;
  border-radius: 999px !important;
  background: #f6f6f6 !important;
  z-index: 0 !important;
}

.bsu-custom-hero-inner {
  position: relative !important;
  z-index: 2 !important;
  width: 100% !important;
}

.bsu-custom-title {
  margin: 0 0 18px !important;
  font-size: clamp(42px, 5vw, 78px) !important;
  line-height: 0.92 !important;
  letter-spacing: -0.075em !important;
  font-weight: 950 !important;
  color: #111 !important;
}

.bsu-custom-meta {
  display: flex !important;
  flex-direction: column !important;
  align-items: flex-start !important;
  gap: 12px !important;
  width: 100% !important;
}

.bsu-open-pill {
  display: inline-flex !important;
  align-items: center !important;
  gap: 9px !important;
  width: fit-content !important;
  max-width: 100% !important;
  padding: 10px 16px !important;
  border-radius: 999px !important;
  background: #111 !important;
  color: #fff !important;
  font-size: 18px !important;
  line-height: 1 !important;
  font-weight: 900 !important;
  letter-spacing: -0.02em !important;
  white-space: nowrap !important;
}

.bsu-open-dot {
  width: 12px !important;
  height: 12px !important;
  border-radius: 999px !important;
  background: #55c878 !important;
  box-shadow: 0 0 0 5px rgba(85, 200, 120, 0.18) !important;
  flex: 0 0 auto !important;
}

.bsu-location-row {
  display: flex !important;
  align-items: center !important;
  justify-content: flex-start !important;
  gap: 14px !important;
  flex-wrap: wrap !important;
  width: 100% !important;
}

.bsu-address {
  font-size: 19px !important;
  line-height: 1.35 !important;

  color: #696969 !important;

}

.bsu-action-row {
  display: inline-flex !important;

}

.bsu-hero-btn {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  min-height: 42px !important;
  padding: 0 19px !important;
  border-radius: 999px !important;
  border: 1px solid rgba(20, 20, 20, 0.12) !important;
  background: #fff !important;
  color: #111 !important;
  text-decoration: none !important;
  font-size: 16px !important;
  font-weight: 900 !important;
  letter-spacing: -0.025em !important;
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03) !important;
  white-space: nowrap !important;
}

.bsu-hero-btn:hover {
  background: #f7f7f7 !important;
}

/* Hide duplicated original header content inside the replaced hero */
.bsu-original-hidden {
  display: none !important;
}

/* Remove outer frame around calendar/date area */
.date-area {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
}

.date-area.is-fixed-fallback {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
}

/* Date arrow buttons: lighter design */
.date-nav {

/* Mobile header */
@media (max-width: 700px) {
  .bsu-custom-hero {
    border-radius: 24px !important;
    padding: 26px 22px 28px !important;
  }

    gap: 8px !important;
    width: 100% !important;
  }

    width: 100% !important;
    min-height: 42px !important;
    font-size: 14px !important;
    padding: 0 10px !important;
  }
}
`;

        const customJs = `
<script>
(function () {
  function findHeaderCard() {
    const open = document.querySelector(".pasadena-open");
    if (!open) return null;

    let node = open.parentElement;

    while (node && node !== document.body) {
      const text = node.textContent || "";
      const hasTitle = text.includes("B SIDE U") || text.includes("BSIDEU");
      const hasAddress = text.includes("350 S Lake");

      if (hasTitle && hasAddress) {
        return node;
      }

      node = node.parentElement;
    }

    return null;
  }

  function getLinkByText(textPart) {
    const links = Array.from(document.querySelectorAll("a"));
    return links.find(function (a) {
      return (a.textContent || "").toLowerCase().includes(textPart.toLowerCase());
    });
  }

  function redesignPasadenaHeader() {
    const headerCard = findHeaderCard();
    if (!headerCard) return;

    if (headerCard.querySelector(".bsu-custom-hero")) return;

    const parkingLink = getLinkByText("Parking");
    const switchLink = getLinkByText("San Gabriel");

    const parkingHref = parkingLink ? parkingLink.getAttribute("href") : "#";
    const switchHref = switchLink ? switchLink.getAttribute("href") : "#";

    const customHero = document.createElement("div");
    customHero.className = "bsu-custom-hero";

    customHero.innerHTML = \`
      <div class="bsu-custom-hero-inner">
        <h1 class="bsu-custom-title">B SIDE U - Pasadena</h1>

        <div class="bsu-custom-meta">
          <div class="bsu-open-pill">
            <span class="bsu-open-dot"></span>
            <span>Open today until 7:00 PM</span>
          </div>

          <div class="bsu-location-row">
            <div class="bsu-address">350 S Lake Ave Ste 115, Pasadena, CA 91101</div>

            <div class="bsu-action-row">
              <a class="bsu-hero-btn" href="\${parkingHref}">Parking / Direction</a>
              <a class="bsu-hero-btn" href="\${switchHref}">Switch to San Gabriel</a>
            </div>
          </div>
        </div>
      </div>
    \`;

    headerCard.innerHTML = "";
    headerCard.appendChild(customHero);
  }

  redesignPasadenaHeader();

  const headerObserver = new MutationObserver(function () {
    redesignPasadenaHeader();
  });

  headerObserver.observe(document.body, {
    childList: true,
    subtree: true
  });

  window.addEventListener("load", redesignPasadenaHeader);
  window.addEventListener("resize", redesignPasadenaHeader);

  setTimeout(redesignPasadenaHeader, 100);
  setTimeout(redesignPasadenaHeader, 300);
  setTimeout(redesignPasadenaHeader, 700);
  setTimeout(redesignPasadenaHeader, 1200);
  setTimeout(redesignPasadenaHeader, 2000);

  /* Remove Morning · 2 openings / Afternoon · 1 opening */
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      let text = el.textContent || "";

      text = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (el.textContent !== text) {
        el.textContent = text;
      }
    });
  }

  function startOpeningCountCleaner() {
    removeOpeningCounts();

    setTimeout(removeOpeningCounts, 100);
    setTimeout(removeOpeningCounts, 300);
    setTimeout(removeOpeningCounts, 700);
    setTimeout(removeOpeningCounts, 1200);

    const observer = new MutationObserver(function () {
      removeOpeningCounts();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });

    document.addEventListener("click", function () {
      setTimeout(removeOpeningCounts, 50);
      setTimeout(removeOpeningCounts, 250);
      setTimeout(removeOpeningCounts, 600);
    }, true);
  }

  startOpeningCountCleaner();
})();
<\\/script>
`;

        html = html.replace("</style>", "\\n" + customCss + "\\n</style>");
        html = html.replace("</body>", customJs + "\\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
</body>
</html>
