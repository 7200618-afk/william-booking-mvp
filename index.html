        let html = await response.text();

        const customCss = `

        const customJs = `
<script>
(function () {
  function addTestBar() {
    if (document.getElementById("bsu-code-test-bar")) return;

    var bar = document.createElement("div");
    bar.id = "bsu-code-test-bar";
    bar.textContent = "NEW HEADER CODE RUNNING";
    document.body.appendChild(bar);

    /* Auto remove after 8 seconds */
    setTimeout(function () {
      var existing = document.getElementById("bsu-code-test-bar");
      if (existing) existing.remove();
    }, 8000);
  }

  function normalizeText(value) {
    return String(value || "")
      .replace(/\\s+/g, " ")
      .replace(/\\u00a0/g, " ")
      .trim()
      .toLowerCase();
  }

  function findTextElement(targetTexts) {
    var all = Array.from(document.querySelectorAll("body *"));

    for (var i = 0; i < all.length; i++) {
      var el = all[i];

      if (el.querySelector(".bsu-force-header")) continue;

      var ownText = Array.from(el.childNodes)
        .filter(function (node) {
          return node.nodeType === Node.TEXT_NODE;
        })
        .map(function (node) {
          return node.textContent;
        })
        .join(" ");

      var own = normalizeText(ownText);
      var full = normalizeText(el.textContent);

      for (var j = 0; j < targetTexts.length; j++) {
        var target = normalizeText(targetTexts[j]);

        if (own === target || full === target) {
          return el;
        }
      }
    }

    return null;
  }

  function findOriginalHeaderCard() {
    var titleEl = findTextElement([
      "B SIDE U - Pasadena",
      "B SIDE U- Pasadena",
      "B SIDE U -Pasadena",
      "BSIDEU - Pasadena",
      "BSIDEU- Pasadena"
    ]);

    if (!titleEl) {
      return null;
    }

    var node = titleEl;

    while (node && node !== document.body && node !== document.documentElement) {
      var text = normalizeText(node.textContent);
      var rect = node.getBoundingClientRect();

      var hasTitle =
        text.indexOf("b side u") !== -1 ||
        text.indexOf("bsideu") !== -1;

      var hasAddress =
        text.indexOf("350 s lake") !== -1 ||
        text.indexOf("pasadena, ca 91101") !== -1;

      var hasParking =
        text.indexOf("parking") !== -1 ||
        text.indexOf("direction") !== -1;

      var wideEnough = rect.width > window.innerWidth * 0.45;
      var reasonableHeight = rect.height > 60 && rect.height < 360;

      if (hasTitle && (hasAddress || hasParking) && wideEnough && reasonableHeight) {
        return node;
      }

      node = node.parentElement;
    }

    return titleEl.parentElement;
  }

  function getExistingHrefByText(keyword, fallback) {
    var links = Array.from(document.querySelectorAll("a"));

    for (var i = 0; i < links.length; i++) {
      var text = normalizeText(links[i].textContent);

      if (text.indexOf(normalizeText(keyword)) !== -1) {
        return links[i].getAttribute("href") || fallback;
      }
    }

    return fallback;
  }

  function buildNewHeaderHTML() {
    var parkingHref = getExistingHrefByText(
      "parking",
      "https://www.google.com/maps/search/?api=1&query=350%20S%20Lake%20Ave%20Ste%20115%2C%20Pasadena%2C%20CA%2091101"
    );

    var sanGabrielHref = getExistingHrefByText(
      "san gabriel",
      "https://www.bsideuhair.com/san-gabriel"
    );

    return '' +
      '<div class="bsu-force-header">' +
        '<div class="bsu-force-header-inner">' +
          '<h1 class="bsu-force-title">B SIDE U - Pasadena</h1>' +

          '<div class="bsu-force-meta">' +
            '<div class="bsu-force-status">' +
              '<span class="bsu-force-status-dot"></span>' +
              '<span>Open today until 7:00 PM</span>' +
            '</div>' +

            '<div class="bsu-force-location-line">' +
              '<div class="bsu-force-address">350 S Lake Ave Ste 115, Pasadena, CA 91101</div>' +

              '<div class="bsu-force-actions">' +
                '<a class="bsu-force-button" href="' + parkingHref + '" target="_blank" rel="noopener">Parking / Direction</a>' +
                '<a class="bsu-force-button" href="' + sanGabrielHref + '">Switch to San Gabriel</a>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function rebuildHeader() {
    addTestBar();

    if (document.querySelector(".bsu-force-header")) {
      return;
    }

    var card = findOriginalHeaderCard();

    if (!card) {
      return;
    }

    card.classList.add("bsu-old-header-cleared");
    card.innerHTML = buildNewHeaderHTML();

    card.style.padding = "0";
    card.style.border = "0";
    card.style.background = "transparent";
    card.style.boxShadow = "none";
    card.style.overflow = "visible";
  }

  function removeOpeningCounts() {
    var all = Array.from(document.querySelectorAll("body *"));

    all.forEach(function (el) {
      if (!el || !el.childNodes || el.childNodes.length !== 1) return;
      if (el.children && el.children.length > 0) return;

      var text = el.textContent || "";
      var newText = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (text !== newText && /morning|afternoon|evening/i.test(text)) {
        el.textContent = newText;
      }
    });
  }

  function runCustomFixes() {
    rebuildHeader();
    removeOpeningCounts();
  }

  runCustomFixes();

  setTimeout(runCustomFixes, 100);
  setTimeout(runCustomFixes, 300);
  setTimeout(runCustomFixes, 700);
  setTimeout(runCustomFixes, 1200);
  setTimeout(runCustomFixes, 2000);
  setTimeout(runCustomFixes, 3500);
  setTimeout(runCustomFixes, 5000);

  var observer = new MutationObserver(function () {
    runCustomFixes();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true,
    characterData: true
  });

  window.addEventListener("load", runCustomFixes);
  window.addEventListener("resize", runCustomFixes);
})();
<\\/script>
`;

        html = html.replace("</style>", "\\n" + customCss + "\\n</style>");
        html = html.replace("</body>", customJs + "\\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
