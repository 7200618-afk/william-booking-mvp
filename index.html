<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    html,
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .bsu-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="bsu-loading">Loading B SIDE U booking...</div>

  <script>
    (async function () {
      const sourceUrl =
        "https://raw.githubusercontent.com/7200618-afk/william-booking-mvp/41b5a444c3ada20bc9d620047297643db44dcc17/index.html";

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `
/* =========================================================
   B SIDE U Pasadena Header Override
   Directly targets the real old page classes.
   ========================================================= */

/* Remove View Profile under staff avatars */
.profile-link-under-card,
.staff-item.is-active .profile-link-under-card {
  display: none !important;
}

/* Header redesign: actual source has these classes */
.pasadena-header {
  display: grid !important;
  grid-template-columns: auto minmax(0, 1fr) !important;
  grid-template-areas:
    "title title"
    "status status"
    "address actions" !important;
  align-items: center !important;
  column-gap: 18px !important;
  row-gap: 13px !important;
  padding: 34px 42px 36px !important;
  border-radius: 34px !important;
  border: 1px solid rgba(17, 17, 17, 0.08) !important;
  background:
    radial-gradient(circle at 100% 100%, #f4f4f4 0 92px, transparent 94px),
    linear-gradient(135deg, #ffffff 0%, #ffffff 58%, #fbfbfb 100%) !important;
  box-shadow: 0 18px 46px rgba(0, 0, 0, 0.045) !important;
  overflow: hidden !important;
}

.pasadena-header::after {
  right: -52px !important;
  bottom: -68px !important;
  width: 185px !important;
  height: 185px !important;
  background: rgba(20, 20, 20, 0.045) !important;
}

.pasadena-title {
  grid-area: title !important;
  margin: 0 !important;
  padding: 0 !important;
  max-width: none !important;
  font-size: clamp(46px, 5.2vw, 82px) !important;
  line-height: 0.92 !important;
  letter-spacing: -0.085em !important;
  font-weight: 950 !important;
  color: #111 !important;
}

.pasadena-open {
  grid-area: status !important;
  display: inline-flex !important;
  width: fit-content !important;
  max-width: 100% !important;
  min-height: 36px !important;
  padding: 0 17px !important;
  margin: 0 !important;
  gap: 9px !important;
  align-items: center !important;
  border-radius: 999px !important;
  background: #111 !important;
  color: #fff !important;
  font-size: 17px !important;
  line-height: 1 !important;
  font-weight: 950 !important;
  letter-spacing: -0.03em !important;
  white-space: nowrap !important;
  box-shadow: 0 10px 24px rgba(20, 20, 20, 0.16) !important;
}

.pasadena-open::before {
  width: 12px !important;
  height: 12px !important;
  background: #55ce79 !important;
  box-shadow: 0 0 0 5px rgba(85, 206, 121, 0.18) !important;
}

/* If older injected JS created a row wrapper, flatten it */
.pasadena-address-row {
  display: contents !important;
}

.pasadena-address {
  grid-area: address !important;
  display: block !important;
  width: auto !important;
  max-width: none !important;
  margin: 0 !important;
  color: #666 !important;
  font-size: 20px !important;
  line-height: 1.35 !important;
  font-weight: 850 !important;
  letter-spacing: -0.04em !important;
  white-space: normal !important;
}

.pasadena-links {
  grid-area: actions !important;
  display: flex !important;
  align-items: center !important;
  justify-content: flex-start !important;
  gap: 10px !important;
  flex-wrap: wrap !important;
  width: auto !important;
  margin: 0 !important;
}

.pasadena-links a {
  min-height: 43px !important;
  padding: 0 21px !important;
  border-radius: 999px !important;
  border: 1px solid rgba(17, 17, 17, 0.13) !important;
  background: #fff !important;
  color: #111 !important;
  text-decoration: none !important;
  font-size: 16px !important;
  line-height: 1 !important;
  font-weight: 900 !important;
  letter-spacing: -0.03em !important;
  white-space: nowrap !important;
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03) !important;
}

.pasadena-links a:hover {
  background: #f7f7f7 !important;
  transform: none !important;
}

/* Remove outer frame around calendar/date area */
.date-area,
.date-area.is-fixed-fallback {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
}

.date-nav {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid rgba(20, 20, 20, 0.12) !important;
  box-shadow: none !important;
}

.date-nav:hover {
  background: #f7f7f7 !important;
  box-shadow: none !important;
}

/* Tablet */
@media (max-width: 900px) {
  .pasadena-header {
    grid-template-columns: 1fr !important;
    grid-template-areas:
      "title"
      "status"
      "address"
      "actions" !important;
    padding: 30px 30px 32px !important;
    border-radius: 28px !important;
  }

  .pasadena-address {
    font-size: 18px !important;
  }
}

/* Mobile */
@media (max-width: 600px) {
  .pasadena-header {
    padding: 24px 20px 26px !important;
    border-radius: 24px !important;
    row-gap: 11px !important;
  }

  .pasadena-title {
    font-size: clamp(38px, 13vw, 58px) !important;
    line-height: 0.93 !important;
  }

  .pasadena-open {
    min-height: 33px !important;
    padding: 0 14px !important;
    font-size: 15px !important;
  }

  .pasadena-address {
    font-size: 16px !important;
    line-height: 1.4 !important;
  }

  .pasadena-links {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 8px !important;
    width: 100% !important;
  }

  .pasadena-links a {
    width: 100% !important;
    min-height: 42px !important;
    padding: 0 10px !important;
    font-size: 14px !important;
    text-align: center !important;
  }
}
`;

        const customJs = `
<script>
(function () {
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      var text = el.textContent || "";
      var newText = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (text !== newText) {
        el.textContent = newText;
      }
    });
  }

  function runFixes() {
    removeOpeningCounts();
  }

  runFixes();
  setTimeout(runFixes, 100);
  setTimeout(runFixes, 300);
  setTimeout(runFixes, 700);
  setTimeout(runFixes, 1200);
  setTimeout(runFixes, 2500);

  var observer = new MutationObserver(runFixes);
  observer.observe(document.body, {
    childList: true,
    subtree: true,
    characterData: true
  });

  document.addEventListener("click", function () {
    setTimeout(runFixes, 50);
    setTimeout(runFixes, 250);
    setTimeout(runFixes, 600);
  }, true);
})();
<\/script>
`;

        html = html.replace("</style>", "\n" + customCss + "\n</style>");
        html = html.replace("</body>", customJs + "\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
</body>
</html>
