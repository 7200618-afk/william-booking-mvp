        const customJs = `
<script>
(function () {
  function addDesktopSiteNav() {
    if (document.querySelector(".bsu-site-nav")) return;
    var page = document.querySelector(".page");
    if (!page || !page.parentNode) return;

    var nav = document.createElement("nav");
    nav.className = "bsu-site-nav";
    nav.innerHTML = '' +
      '<a class="bsu-site-logo" href="https://www.bsideuhair.com/">B SIDE U</a>' +
      '<div class="bsu-site-links">' +
        '<a class="bsu-site-link" href="https://www.bsideuhair.com/photo">Photo</a>' +
        '<a class="bsu-site-link" href="https://www.bsideuhair.com/team">Team</a>' +
        '<a class="bsu-site-link" href="https://www.bsideuhair.com/location">Location</a>' +
        '<a class="bsu-site-link" href="https://www.bsideuhair.com/services">Services</a>' +
        '<a class="bsu-site-link" href="https://www.bsideuhair.com/shop">Shop</a>' +
        '<a class="bsu-site-book" href="https://pasadena.bsideuhair.com/">Book Now</a>' +
      '</div>';

    page.parentNode.insertBefore(nav, page);
  }

  function moveServicesForDesktop() {
    var bookingLayout = document.querySelector(".booking-layout");
    var controlsCard = bookingLayout ? bookingLayout.querySelector(":scope > div:nth-child(2)") : null;
    var resultsArea = document.querySelector(".desktop-results-area");
    var servicePills = document.querySelector(".service-pills");

    if (!bookingLayout || !controlsCard || !resultsArea || !servicePills) return;

    var isDesktop = window.innerWidth >= 1024;

    var serviceLabel = Array.from(document.querySelectorAll(".section-label")).find(function (el) {
      return /services/i.test(el.textContent || "") && !el.closest(".desktop-service-panel");
    }) || document.querySelector(".desktop-service-panel .section-label");

    var message = document.querySelector(".message");
    var panel = document.querySelector(".desktop-service-panel");
    var placeholder = document.querySelector(".desktop-service-placeholder");

    if (!placeholder && serviceLabel && serviceLabel.parentNode) {
      placeholder = document.createElement("div");
      placeholder.className = "desktop-service-placeholder";
      serviceLabel.parentNode.insertBefore(placeholder, serviceLabel);
    }

    if (!panel) {
      panel = document.createElement("div");
      panel.className = "desktop-service-panel";
    }

    if (isDesktop) {
      if (!panel.parentNode) {
        resultsArea.insertBefore(panel, resultsArea.firstChild);
      }

      if (serviceLabel && serviceLabel.parentNode !== panel) panel.appendChild(serviceLabel);
      if (servicePills.parentNode !== panel) panel.appendChild(servicePills);
      if (message && message.parentNode !== panel) panel.appendChild(message);
    } else if (placeholder && placeholder.parentNode) {
      if (serviceLabel && serviceLabel.parentNode !== placeholder.parentNode) {
        placeholder.parentNode.insertBefore(serviceLabel, placeholder.nextSibling);
      }
      if (servicePills.parentNode !== placeholder.parentNode) {
        placeholder.parentNode.insertBefore(servicePills, serviceLabel ? serviceLabel.nextSibling : placeholder.nextSibling);
      }
      if (message && message.parentNode !== placeholder.parentNode) {
        placeholder.parentNode.insertBefore(message, servicePills.nextSibling);
      }
      if (panel && panel.parentNode && panel.childNodes.length === 0) {
        panel.remove();
      }
    }
  }

  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      var text = el.textContent || "";
      var newText = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();
      if (text !== newText) el.textContent = newText;
    });
  }
  function runFixes() {
    addDesktopSiteNav();
    moveServicesForDesktop();
    removeOpeningCounts();
  }
  runFixes();
  setTimeout(runFixes, 100);
  setTimeout(runFixes, 300);
  setTimeout(runFixes, 700);
  setTimeout(runFixes, 1200);
  setTimeout(runFixes, 2500);
  var observer = new MutationObserver(runFixes);
  observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  window.addEventListener("resize", runFixes);
  document.addEventListener("click", function () {
    setTimeout(runFixes, 50);
    setTimeout(runFixes, 250);
    setTimeout(runFixes, 600);
  }, true);
})();
<\/script>
`;
