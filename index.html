    if(datePlaceholder&&datePlaceholder.parentNode&&dateArea.parentNode!==datePlaceholder.parentNode){
      datePlaceholder.parentNode.insertBefore(dateArea,datePlaceholder.nextSibling);
    }

    if(staffLabel&&staffLabelPlaceholder&&staffLabelPlaceholder.parentNode&&staffLabel.parentNode!==staffLabelPlaceholder.parentNode){
      staffLabelPlaceholder.parentNode.insertBefore(staffLabel,staffLabelPlaceholder.nextSibling);
    }

    if(staffStripPlaceholder&&staffStripPlaceholder.parentNode&&staffStrip.parentNode!==staffStripPlaceholder.parentNode){
      staffStripPlaceholder.parentNode.insertBefore(staffStrip,staffStripPlaceholder.nextSibling);
    }

    if(stickyWrap)stickyWrap.remove();
    if(staffOnly)staffOnly.remove();
    return;
  }

  if(!stickyWrap){
    stickyWrap=document.createElement("div");
    stickyWrap.className="bsu-mobile-sticky-date-staff";
    booking.insertBefore(stickyWrap,booking.firstChild);
  }

  if(!staffOnly){
    staffOnly=document.createElement("div");
    staffOnly.className="bsu-mobile-sticky-staff-only";
    stickyWrap.appendChild(staffOnly);
  }

  if(dateArea.parentNode!==stickyWrap){
    stickyWrap.insertBefore(dateArea,stickyWrap.firstChild);
  }

  if(staffLabel&&staffLabel.parentNode!==staffOnly){
    staffOnly.appendChild(staffLabel);
  }

  if(staffStrip.parentNode!==staffOnly){
    staffOnly.appendChild(staffStrip);
  }
}

function ensureBookingFailureModal(){
  if(document.getElementById("bsuBookingFailOverlay"))return;

  var overlay=document.createElement("div");
  overlay.id="bsuBookingFailOverlay";
  overlay.className="bsu-booking-fail-overlay";
  overlay.innerHTML=
    '<div class="bsu-booking-fail-card" role="dialog" aria-modal="true" aria-labelledby="bsuBookingFailTitle">'+
      '<div class="bsu-booking-fail-icon">!</div>'+
      '<h2 id="bsuBookingFailTitle" class="bsu-booking-fail-title">Booking Not Completed</h2>'+
      '<p class="bsu-booking-fail-text">Sorry, this appointment time was just taken by another customer. Your appointment was not booked.</p>'+
      '<div id="bsuBookingFailDetail" class="bsu-booking-fail-detail">Please choose another available time.</div>'+
      '<button id="bsuBookingFailBtn" class="bsu-booking-fail-btn" type="button">Choose Another Time</button>'+
      '<div class="bsu-booking-fail-small">No appointment was created.</div>'+
    '</div>';

  document.body.appendChild(overlay);

  function closeFailureModal(){
    overlay.classList.remove("is-visible");
    var bookingModal=document.getElementById("bookingModal");
    if(bookingModal)bookingModal.classList.remove("is-visible");
    document.body.style.overflow="";
    setTimeout(function(){
      try{
        var selected=document.querySelector(".time-btn.is-selected");
        if(selected)selected.classList.remove("is-selected");
      }catch(e){}
    },30);
  }

  overlay.addEventListener("click",function(e){
    if(e.target===overlay)closeFailureModal();
  });

  var btn=document.getElementById("bsuBookingFailBtn");
  if(btn)btn.addEventListener("click",closeFailureModal);

  document.addEventListener("keydown",function(e){
    if(e.key==="Escape"&&overlay.classList.contains("is-visible"))closeFailureModal();
  });
}

function showBookingFailureModal(message){
  ensureBookingFailureModal();

  var detail=document.getElementById("bsuBookingFailDetail");
  if(detail){
    detail.textContent=message&&message.length<180
      ? message
      : "Please choose another available time.";
  }

  var overlay=document.getElementById("bsuBookingFailOverlay");
  if(overlay)overlay.classList.add("is-visible");
}

function patchCreateBookingFailureModal(){
  if(window.__bsuCreateBookingFailurePatched)return;
  window.__bsuCreateBookingFailurePatched=true;

  var originalFetch=window.fetch.bind(window);

  window.fetch=async function(input,init){
    var response=await originalFetch(input,init);

    try{
      var url=typeof input==="string" ? input : (input&&input.url ? input.url : "");
      var method=String((init&&init.method)||"GET").toUpperCase();

      if(url.indexOf("/api/create-booking")!==-1 && method==="POST" && !response.ok){
        response.clone().json().then(function(data){
          var msg=(data&&data.error)||"Booking failed. Please choose another available time.";

          if(
            response.status===409 ||
            /no longer available|being booked|another customer|choose another/i.test(msg)
          ){
            setTimeout(function(){
              showBookingFailureModal(msg);
            },80);
          }
        }).catch(function(){
          if(response.status===409){
            setTimeout(function(){
              showBookingFailureModal("This appointment time is no longer available. Please choose another time.");
            },80);
          }
        });
      }
    }catch(e){}

    return response;
  };
}

function stopMobilePhotoWallCarousel(){
  if(mobilePhotoWallRaf){
    cancelAnimationFrame(mobilePhotoWallRaf);
    mobilePhotoWallRaf=null;
  }
  mobilePhotoWallTrack=null;
  mobilePhotoWallLastTs=null;
}

function pauseMobilePhotoWallCarousel(){
  mobilePhotoWallPauseUntil=Date.now()+2500;
  mobilePhotoWallLastTs=null;
}

function setupMobilePhotoWallCarousel(){
  var track=document.querySelector(".desktop-photo-wall-section .staff-carousel-track");

  if(!isMobile()){
    stopMobilePhotoWallCarousel();
    if(track){
      track.style.removeProperty("overflow-x");
      track.style.removeProperty("scroll-behavior");
      track.style.removeProperty("touch-action");
    }
    return;
  }

  if(!track)return;

  track.style.setProperty("transform","none","important");
  track.style.setProperty("overflow-x","auto","important");
  track.style.setProperty("overflow-y","hidden","important");
  track.style.setProperty("scroll-behavior","auto","important");
  track.style.setProperty("-webkit-overflow-scrolling","touch","important");
  track.style.setProperty("touch-action","auto","important");

  if(mobilePhotoWallTrack!==track){
    stopMobilePhotoWallCarousel();
    mobilePhotoWallTrack=track;
    mobilePhotoWallLastTs=null;
  }

  if(!track.dataset.bsuMobileCarouselBound){
    track.dataset.bsuMobileCarouselBound="1";
    track.addEventListener("touchstart",pauseMobilePhotoWallCarousel,{passive:true});
    track.addEventListener("touchmove",pauseMobilePhotoWallCarousel,{passive:true});
    track.addEventListener("pointerdown",pauseMobilePhotoWallCarousel,{passive:true});
    track.addEventListener("wheel",pauseMobilePhotoWallCarousel,{passive:true});
  }

  if(mobilePhotoWallRaf)return;

  function tick(ts){
    if(!isMobile()){
      stopMobilePhotoWallCarousel();
      return;
    }

    if(!mobilePhotoWallTrack||!document.body.contains(mobilePhotoWallTrack)){
      stopMobilePhotoWallCarousel();
      return;
    }

    var currentTrack=mobilePhotoWallTrack;

    if(mobilePhotoWallLastTs===null){
      mobilePhotoWallLastTs=ts;
    }

    var dt=Math.min(48,ts-mobilePhotoWallLastTs);
    mobilePhotoWallLastTs=ts;

    var maxScroll=currentTrack.scrollWidth-currentTrack.clientWidth;
    var isPaused=Date.now()<mobilePhotoWallPauseUntil;

    if(!isPaused&&maxScroll>12){
      currentTrack.scrollLeft+=dt*0.045;

      if(currentTrack.scrollLeft>=maxScroll-2){
        currentTrack.scrollLeft=0;
      }
    }

    mobilePhotoWallRaf=requestAnimationFrame(tick);
  }

  mobilePhotoWallRaf=requestAnimationFrame(tick);
}

function getSelectedStaffName(){var el=document.querySelector(".staff-item.is-active .staff-name")||document.querySelector(".staff-card.is-active .staff-name");return el?(el.textContent||"").trim():""}
function getDateText(){var el=document.querySelector(".date-nav")||document.querySelector(".date-area");return el?(el.textContent||""):""}
function parseDisplayDate(){var m=getDateText().match(/(\\d{1,2})\\s*\\/\\s*(\\d{1,2})/);if(!m)return null;var now=new Date();var y=now.getFullYear();var dt=new Date(y,Number(m[1])-1,Number(m[2]));if(dt.getTime()<now.getTime()-15552000000)dt.setFullYear(y+1);return dt}
function staffWorksOn(name,dt){var days=WORK_DAYS[name];if(!days||!dt)return true;return days.indexOf(DAY_KEYS[dt.getDay()])>-1}
function nextWorkLabel(name,dt){var days=WORK_DAYS[name];if(!days||!dt)return"";for(var i=1;i<=14;i++){var n=new Date(dt);n.setDate(dt.getDate()+i);if(days.indexOf(DAY_KEYS[n.getDay()])>-1)return DAY_LABELS[n.getDay()]+" "+(n.getMonth()+1)+"/"+n.getDate()}return""}
function fixOffDayFullyBookedStatus(){var dt=parseDisplayDate();if(!dt)return;document.querySelectorAll(".staff-item,.staff-card").forEach(function(card){var n=card.querySelector(".staff-name");var s=card.querySelector(".staff-status");if(!n||!s)return;var name=(n.textContent||"").trim();var txt=(s.textContent||"").trim();if(!name||!/fully booked/i.test(txt))return;if(!staffWorksOn(name,dt)){var label=nextWorkLabel(name,dt);if(label){s.textContent=label;s.style.setProperty("background","#f2f2f2","important");s.style.setProperty("color","#666","important");s.style.setProperty("font-weight","900","important")}}})}
function syncGalleryToSelectedStaff(){var name=getSelectedStaffName();if(!name)return;window.bsuInitialGalleryStaff=name;if(name===lastGalleryStaff)return;if(window.bsuSetGalleryStaff){lastGalleryStaff=name;window.bsuSetGalleryStaff(name)}}
function hasTimeButtons(slotArea){if(!slotArea)return false;var buttons=Array.from(slotArea.querySelectorAll(".time-btn"));return buttons.some(function(btn){return !btn.disabled&&(btn.textContent||"").trim().length>0})}
function hasLoadingFrame(slotArea){return !!(slotArea&&slotArea.querySelector&&slotArea.querySelector(".bsu-availability-loading-frame"))}
function currentResultsAnchor(){
  var slotArea=document.querySelector(".desktop-right-panel .slot-area")||document.querySelector(".desktop-results-area .slot-area")||document.querySelector(".slot-area");
  var emptyState=document.querySelector(".desktop-right-panel .empty-state")||document.querySelector(".desktop-results-area .empty-state")||document.querySelector(".empty-state");

  if(hasLoadingFrame(slotArea)||hasTimeButtons(slotArea)){
    return slotArea;
  }

  if(emptyState&&emptyState.classList&&emptyState.classList.contains("is-visible")){
    return emptyState;
  }

  return slotArea||emptyState;
}
function movePhotoWall(){
  var photo=document.querySelector(".desktop-photo-wall-section");
  var booking=document.querySelector(".booking-layout");
  if(!photo||!booking)return;

  if(isMobile()){
    var anchor=currentResultsAnchor();
    if(anchor&&anchor.parentNode&&photo.previousElementSibling!==anchor){
      anchor.parentNode.insertBefore(photo,anchor.nextSibling);
    }
  }else{
    if(photo.parentNode!==booking){
      booking.appendChild(photo);
    }
  }
}
function moveServicesForDesktop(){
  var resultsArea=document.querySelector(".desktop-results-area");
  var servicePills=document.querySelector(".service-pills");
  var slotArea=document.querySelector(".desktop-results-area .slot-area")||document.querySelector(".desktop-right-panel .slot-area")||document.querySelector(".slot-area");
  var emptyState=document.querySelector(".desktop-results-area .empty-state")||document.querySelector(".desktop-right-panel .empty-state")||document.querySelector(".empty-state");
  if(!resultsArea||!servicePills)return;

  var desktop=!isMobile();
  var serviceLabel=Array.from(document.querySelectorAll(".section-label")).find(function(el){return /services/i.test(el.textContent||"")&&!el.closest(".desktop-service-panel")})||document.querySelector(".desktop-service-panel .section-label");
  var message=document.querySelector(".message");
  var panel=document.querySelector(".desktop-service-panel")||document.createElement("div");
  panel.className="desktop-service-panel";
  var rightPanel=document.querySelector(".desktop-right-panel")||document.createElement("div");
  rightPanel.className="desktop-right-panel";
  var placeholder=document.querySelector(".desktop-service-placeholder");
  var slotPlaceholder=document.querySelector(".desktop-slot-placeholder");
  var emptyPlaceholder=document.querySelector(".desktop-empty-placeholder");

  if(!placeholder&&serviceLabel&&serviceLabel.parentNode){
    placeholder=document.createElement("div");
    placeholder.className="desktop-service-placeholder";
    serviceLabel.parentNode.insertBefore(placeholder,serviceLabel);
  }

  if(!slotPlaceholder&&slotArea&&slotArea.parentNode){
    slotPlaceholder=document.createElement("div");
    slotPlaceholder.className="desktop-slot-placeholder";
    slotArea.parentNode.insertBefore(slotPlaceholder,slotArea);
  }

  if(!emptyPlaceholder&&emptyState&&emptyState.parentNode){
    emptyPlaceholder=document.createElement("div");
    emptyPlaceholder.className="desktop-empty-placeholder";
    emptyState.parentNode.insertBefore(emptyPlaceholder,emptyState);
  }

  if(desktop){
    if(!rightPanel.parentNode)resultsArea.insertBefore(rightPanel,resultsArea.firstChild);
    if(panel.parentNode!==rightPanel)rightPanel.appendChild(panel);
    if(serviceLabel&&serviceLabel.parentNode!==panel)panel.appendChild(serviceLabel);
    if(servicePills.parentNode!==panel)panel.appendChild(servicePills);
    if(message&&message.parentNode!==panel)panel.appendChild(message);
    if(slotArea&&slotArea.parentNode!==rightPanel)rightPanel.appendChild(slotArea);
    if(emptyState&&emptyState.parentNode!==rightPanel)rightPanel.appendChild(emptyState);

    var showTimes=hasTimeButtons(slotArea);
    var loading=hasLoadingFrame(slotArea);
    var emptyVisible=emptyState&&emptyState.classList&&emptyState.classList.contains("is-visible");

    setImportantDisplay(slotArea,(showTimes||loading)?"block":"none");
    setImportantDisplay(emptyState,(!showTimes&&!loading&&emptyVisible)?"block":"none");
  }else{
    if(placeholder&&placeholder.parentNode){
      if(serviceLabel&&serviceLabel.parentNode!==placeholder.parentNode)placeholder.parentNode.insertBefore(serviceLabel,placeholder.nextSibling);
      if(servicePills.parentNode!==placeholder.parentNode)placeholder.parentNode.insertBefore(servicePills,serviceLabel?serviceLabel.nextSibling:placeholder.nextSibling);
      if(message&&message.parentNode!==placeholder.parentNode)placeholder.parentNode.insertBefore(message,servicePills.nextSibling);
    }

    if(slotPlaceholder&&slotPlaceholder.parentNode&&slotArea&&slotArea.parentNode!==slotPlaceholder.parentNode){
      slotPlaceholder.parentNode.insertBefore(slotArea,slotPlaceholder.nextSibling);
    }

    if(emptyPlaceholder&&emptyPlaceholder.parentNode&&emptyState&&emptyState.parentNode!==emptyPlaceholder.parentNode){
      emptyPlaceholder.parentNode.insertBefore(emptyState,emptyPlaceholder.nextSibling);
    }

    if(slotArea)slotArea.style.removeProperty("display");
    if(emptyState)emptyState.style.removeProperty("display");
  }
}
