<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    html,
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .bsu-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="bsu-loading">Loading B SIDE U booking...</div>

  <script>
    (async function () {
      const sourceUrl =
        "https://raw.githubusercontent.com/7200618-afk/william-booking-mvp/41b5a444c3ada20bc9d620047297643db44dcc17/index.html";

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `
/* =========================================================
   B SIDE U Pasadena Header Override V2
   Smaller scale + true separated header rows.
   ========================================================= */

.profile-link-under-card,
.staff-item.is-active .profile-link-under-card {
  display: none !important;
}

/* Slightly smaller whole desktop composition */
@media (min-width: 1024px) {
  .page {
    max-width: 1120px !important;
    padding: 20px 22px 48px !important;
  }

  .booking-layout {
    grid-template-columns: minmax(350px, 400px) minmax(0, 1fr) !important;
    gap: 14px 16px !important;
  }

  .booking-layout > div:nth-child(2) {
    padding: 15px !important;
    border-radius: 26px !important;
  }

  .staff-card {
    min-height: 128px !important;
    border-radius: 20px !important;
    padding: 9px 7px 8px !important;
  }

  .avatar {
    width: 56px !important;
    height: 56px !important;
  }

  .staff-name,
  .service-name {
    font-size: 12.8px !important;
  }

  .staff-status,
  .service-meta {
    font-size: 9.8px !important;
  }

  .time-btn {
    min-height: 50px !important;
    font-size: 14px !important;
  }
}

/* Header: force four rows so time is never same row as address/buttons */
.pasadena-header {
  display: grid !important;
  grid-template-columns: 1fr !important;
  grid-template-areas:
    "title"
    "status"
    "address"
    "actions" !important;
  align-items: start !important;
  justify-items: start !important;
  row-gap: 9px !important;
  padding: 24px 30px 26px !important;
  margin-bottom: 16px !important;
  border-radius: 28px !important;
  border: 1px solid rgba(17, 17, 17, 0.08) !important;
  background:
    radial-gradient(circle at 100% 100%, #f4f4f4 0 78px, transparent 80px),
    linear-gradient(135deg, #ffffff 0%, #ffffff 62%, #fbfbfb 100%) !important;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04) !important;
  overflow: hidden !important;
}

.pasadena-header::after {
  right: -58px !important;
  bottom: -74px !important;
  width: 150px !important;
  height: 150px !important;
  background: rgba(20, 20, 20, 0.04) !important;
}

.pasadena-title {
  grid-area: title !important;
  margin: 0 0 2px !important;
  padding: 0 !important;
  max-width: none !important;
  font-size: clamp(34px, 3.1vw, 44px) !important;
  line-height: 0.96 !important;
  letter-spacing: -0.055em !important;
  font-weight: 950 !important;
  color: #111 !important;
}

.pasadena-open {
  grid-area: status !important;
  display: inline-flex !important;
  width: fit-content !important;
  max-width: 100% !important;
  min-height: 29px !important;
  padding: 0 12px !important;
  margin: 0 !important;
  gap: 8px !important;
  align-items: center !important;
  border-radius: 999px !important;
  background: #111 !important;
  color: #fff !important;
  font-size: 12.8px !important;
  line-height: 1 !important;
  font-weight: 900 !important;
  letter-spacing: -0.015em !important;
  white-space: nowrap !important;
  box-shadow: none !important;
}

.pasadena-open::before {
  width: 8px !important;
  height: 8px !important;
  background: #55ce79 !important;
  box-shadow: 0 0 0 4px rgba(85, 206, 121, 0.18) !important;
}

.pasadena-address-row {
  display: contents !important;
}

.pasadena-address {
  grid-area: address !important;
  display: block !important;
  width: auto !important;
  max-width: 760px !important;
  margin: 0 !important;
  color: #666 !important;
  font-size: 13.5px !important;
  line-height: 1.35 !important;
  font-weight: 800 !important;
  letter-spacing: -0.02em !important;
  white-space: normal !important;
}

.pasadena-links {
  grid-area: actions !important;
  display: flex !important;
  align-items: center !important;
  justify-content: flex-start !important;
  gap: 9px !important;
  flex-wrap: wrap !important;
  width: auto !important;
  margin: 2px 0 0 !important;
}

.pasadena-links a {
  min-height: 35px !important;
  padding: 0 15px !important;
  border-radius: 999px !important;
  border: 1px solid rgba(17, 17, 17, 0.13) !important;
  background: #fff !important;
  color: #111 !important;
  text-decoration: none !important;
  font-size: 12.5px !important;
  line-height: 1 !important;
  font-weight: 900 !important;
  letter-spacing: -0.015em !important;
  white-space: nowrap !important;
  box-shadow: none !important;
}

.pasadena-links a:hover {
  background: #f7f7f7 !important;
  transform: none !important;
}

.date-area,
.date-area.is-fixed-fallback {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
}

.date-nav {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid rgba(20, 20, 20, 0.12) !important;
  box-shadow: none !important;
}

.date-nav:hover {
  background: #f7f7f7 !important;
  box-shadow: none !important;
}

@media (max-width: 900px) {
  .pasadena-header {
    padding: 24px 24px 26px !important;
    border-radius: 26px !important;
  }

  .pasadena-title {
    font-size: clamp(32px, 7vw, 44px) !important;
  }

  .pasadena-address {
    font-size: 13.5px !important;
  }
}

@media (max-width: 600px) {
  .page {
    padding: 10px 10px 26px !important;
  }

  .pasadena-header {
    padding: 20px 16px 18px !important;
    border-radius: 22px !important;
    row-gap: 8px !important;
  }

  .pasadena-title {
    font-size: clamp(30px, 11vw, 42px) !important;
    line-height: 0.96 !important;
  }

  .pasadena-open {
    min-height: 29px !important;
    padding: 0 11px !important;
    font-size: 12px !important;
  }

  .pasadena-address {
    font-size: 12.8px !important;
    line-height: 1.38 !important;
  }

  .pasadena-links {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 8px !important;
    width: 100% !important;
    margin-top: 3px !important;
  }

  .pasadena-links a {
    width: 100% !important;
    min-height: 38px !important;
    padding: 0 8px !important;
    font-size: 11.8px !important;
    text-align: center !important;
  }
}
`;

        const customJs = `
<script>
(function () {
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      var text = el.textContent || "";
      var newText = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (text !== newText) {
        el.textContent = newText;
      }
    });
  }

  function runFixes() {
    removeOpeningCounts();
  }

  runFixes();
  setTimeout(runFixes, 100);
  setTimeout(runFixes, 300);
  setTimeout(runFixes, 700);
  setTimeout(runFixes, 1200);
  setTimeout(runFixes, 2500);

  var observer = new MutationObserver(runFixes);
  observer.observe(document.body, {
    childList: true,
    subtree: true,
    characterData: true
  });

  document.addEventListener("click", function () {
    setTimeout(runFixes, 50);
    setTimeout(runFixes, 250);
    setTimeout(runFixes, 600);
  }, true);
})();
<\/script>
`;

        html = html.replace("</style>", "\n" + customCss + "\n</style>");
        html = html.replace("</body>", customJs + "\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
</body>
</html>
