<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    html,
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .bsu-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="bsu-loading">Loading B SIDE U booking...</div>

  <script>
    (async function () {
      const sourceUrl =
        "https://raw.githubusercontent.com/7200618-afk/william-booking-mvp/41b5a444c3ada20bc9d620047297643db44dcc17/index.html";

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `
/* ===============================
   B SIDE U Custom Fixes
   =============================== */

/* Remove View Profile under staff avatars */
.profile-link-under-card,
.staff-item.is-active .profile-link-under-card {
  display: none !important;
}

/* Force Pasadena header meta into two real rows */
.pasadena-header-stack {
  display: flex !important;
  flex-direction: column !important;
  align-items: flex-start !important;
  justify-content: flex-start !important;
  width: 100% !important;
  max-width: 100% !important;
  gap: 12px !important;
  margin-top: 10px !important;
}

.pasadena-open-row {
  display: flex !important;
  width: 100% !important;
  max-width: 100% !important;
  align-items: center !important;
  justify-content: flex-start !important;
}

.pasadena-address-row {
  display: flex !important;
  width: 100% !important;
  max-width: 100% !important;
  align-items: center !important;
  justify-content: flex-start !important;
  gap: 14px !important;
  flex-wrap: wrap !important;
  margin: 0 !important;
  padding: 0 !important;
}

.pasadena-open {
  display: inline-flex !important;
  width: fit-content !important;
  max-width: 100% !important;
  margin: 0 !important;
  flex: 0 0 auto !important;
}

.pasadena-address {
  display: inline-flex !important;
  width: auto !important;
  max-width: none !important;
  margin: 0 !important;
  line-height: 1.45 !important;
  flex: 0 1 auto !important;
}

.pasadena-links {
  display: inline-flex !important;
  width: auto !important;
  margin: 0 !important;
  gap: 8px !important;
  flex-wrap: wrap !important;
  flex: 0 0 auto !important;
}

/* Override original horizontal meta layout */
.pasadena-meta,
.pasadena-info,
.pasadena-location,
.location-row,
.header-meta,
.hero-meta {
  display: block !important;
  width: 100% !important;
  max-width: 100% !important;
}

/* Mobile */
@media (max-width: 600px) {
  .pasadena-header-stack {
    gap: 10px !important;
    margin-top: 8px !important;
  }

  .pasadena-open-row {
    display: block !important;
  }

  .pasadena-address-row {
    display: block !important;
    width: 100% !important;
  }

  .pasadena-address {
    display: block !important;
    width: 100% !important;
    margin: 0 0 8px !important;
  }

  .pasadena-links {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    width: 100% !important;
    gap: 8px !important;
  }
}

/* Remove outer frame around calendar/date area */
.date-area {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
}

.date-area.is-fixed-fallback {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
}

/* Date arrow buttons: lighter design */
.date-nav {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid rgba(20, 20, 20, 0.12) !important;
  box-shadow: none !important;
}

.date-nav:hover {
  background: #f7f7f7 !important;
  box-shadow: none !important;
}
`;

        const customJs = `
<script>
(function () {
  function fixPasadenaHeaderRows() {
    const open = document.querySelector(".pasadena-open");
    const address = document.querySelector(".pasadena-address");
    const links = document.querySelector(".pasadena-links");

    if (!open || !address || !links) return;

    const originalParent = open.parentElement;
    if (!originalParent) return;

    let stack = document.querySelector(".pasadena-header-stack");
    let openRow = document.querySelector(".pasadena-open-row");
    let addressRow = document.querySelector(".pasadena-address-row");

    if (!stack) {
      stack = document.createElement("div");
      stack.className = "pasadena-header-stack";
      originalParent.insertBefore(stack, open);
    }

    if (!openRow) {
      openRow = document.createElement("div");
      openRow.className = "pasadena-open-row";
      stack.appendChild(openRow);
    }

    if (!addressRow) {
      addressRow = document.createElement("div");
      addressRow.className = "pasadena-address-row";
      stack.appendChild(addressRow);
    }

    if (!openRow.contains(open)) {
      openRow.appendChild(open);
    }

    if (!addressRow.contains(address)) {
      addressRow.appendChild(address);
    }

    if (!addressRow.contains(links)) {
      addressRow.appendChild(links);
    }
  }

  fixPasadenaHeaderRows();

  const headerObserver = new MutationObserver(function () {
    fixPasadenaHeaderRows();
  });

  headerObserver.observe(document.body, {
    childList: true,
    subtree: true
  });

  window.addEventListener("load", fixPasadenaHeaderRows);
  window.addEventListener("resize", fixPasadenaHeaderRows);

  setTimeout(fixPasadenaHeaderRows, 100);
  setTimeout(fixPasadenaHeaderRows, 300);
  setTimeout(fixPasadenaHeaderRows, 700);
  setTimeout(fixPasadenaHeaderRows, 1200);
  setTimeout(fixPasadenaHeaderRows, 2000);

  /* Remove Morning · 2 openings / Afternoon · 1 opening */
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      let text = el.textContent || "";

      text = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (el.textContent !== text) {
        el.textContent = text;
      }
    });
  }

  function startOpeningCountCleaner() {
    removeOpeningCounts();

    setTimeout(removeOpeningCounts, 100);
    setTimeout(removeOpeningCounts, 300);
    setTimeout(removeOpeningCounts, 700);
    setTimeout(removeOpeningCounts, 1200);

    const observer = new MutationObserver(function () {
      removeOpeningCounts();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });

    document.addEventListener("click", function () {
      setTimeout(removeOpeningCounts, 50);
      setTimeout(removeOpeningCounts, 250);
      setTimeout(removeOpeningCounts, 600);
    }, true);
  }

  startOpeningCountCleaner();

})();
<\\/script>
`;

        html = html.replace("</style>", "\\n" + customCss + "\\n</style>");
        html = html.replace("</body>", customJs + "\\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
</body>
</html>
