          `function getOpeningCountFromCache(staffKey, date) {
      const staff = STAFF_DATA[staffKey];

      if (!staff) return -1;

      const statusServiceKey =
        staffKey === selectedStaffKey && selectedServiceKey
          ? selectedServiceKey
          : staff.defaultService;

      const cacheKey = getStatusCacheKey(staffKey, statusServiceKey, date);
      const cached = staffStatusCache[cacheKey];

      if (!cached) return -1;

      if (typeof cached.openingCount === "number") {
        return cached.openingCount;
      }

      return cached.hasOpening ? 1 : 0;
    }

    function getStaffTiePriority(staffKey) {
      const fixedOrder = ["william", "ryan", "ken", "nami", "fiona", "jacob"];
      const normalizedKey = String(staffKey || "").toLowerCase();
      const index = fixedOrder.indexOf(normalizedKey);

      if (index === -1) {
        return -1000 + (STAFF_DATA[staffKey]?.order || 0);
      }

      return index;
    }

    function sortByOpeningCountThenStaffOrder(a, b, date) {
      const countA = getOpeningCountFromCache(a, date);
      const countB = getOpeningCountFromCache(b, date);

      if (countB !== countA) {
        return countB - countA;
      }

      const priorityA = getStaffTiePriority(a);
      const priorityB = getStaffTiePriority(b);

      if (priorityA !== priorityB) {
        return priorityA - priorityB;
      }

      return (STAFF_DATA[a]?.order || 0) - (STAFF_DATA[b]?.order || 0);
    }

    function sortByStaffTieOrder(a, b) {
      const priorityA = getStaffTiePriority(a);
      const priorityB = getStaffTiePriority(b);

      if (priorityA !== priorityB) {
        return priorityA - priorityB;
      }

      return (STAFF_DATA[a]?.order || 0) - (STAFF_DATA[b]?.order || 0);
    }

    function getOrderedStaffKeys(date) {
      const keys = Object.keys(STAFF_DATA);

      const workingOpenNonJacob = [];
      const jacobWorking = [];
      const workingFullNonJacob = [];
      const notWorking = [];

      keys.forEach(key => {
        const staff = STAFF_DATA[key];
        const isJacob = String(key || "").toLowerCase() === "jacob";
        const workingToday = isWorking(key, date);

        const statusServiceKey =
          key === selectedStaffKey && selectedServiceKey
            ? selectedServiceKey
            : staff.defaultService;

        const cacheKey = getStatusCacheKey(key, statusServiceKey, date);
        const cached = staffStatusCache[cacheKey];

        if (!workingToday && !(cached && cached.hasOpening)) {
          notWorking.push(key);
          return;
        }

        if (isJacob) {
          jacobWorking.push(key);
          return;
        }

        if (cached && cached.isFull) {
          workingFullNonJacob.push(key);
          return;
        }

        workingOpenNonJacob.push(key);
      });

      workingOpenNonJacob.sort((a, b) => {
        return sortByOpeningCountThenStaffOrder(a, b, date);
      });

      jacobWorking.sort(sortByStaffTieOrder);
      workingFullNonJacob.sort(sortByStaffTieOrder);
      notWorking.sort(sortByStaffTieOrder);

      return [
        ...workingOpenNonJacob,
        ...jacobWorking,
        ...workingFullNonJacob,
        ...notWorking
      ];
    }

    if(!clone)return;

    img.style.setProperty("user-select","none","important");

function getPhotoWallLoopWidth(track){

  var firstLeft=first.offsetLeft||0;
  var lastRight=(last.offsetLeft||0)+(last.offsetWidth||0);
  var measured=lastRight-firstLeft;

  if(measured>60)return measured;

  var total=0;
  baseItems.forEach(function(item){
    total+=(item.getBoundingClientRect().width||item.offsetWidth||0);
  });

  var gap=0;
  try{
    var style=window.getComputedStyle(track);
    gap=parseFloat(style.columnGap||style.gap||"0")||0;
  }catch(e){}

  total+=gap*Math.max(0,baseItems.length-1);
  if(total>60)return total;

  var fallback=Math.floor((track.scrollWidth||0)/2);
  return fallback>60?fallback:0;
}

function startPhotoWallAutoScroll(){
  if(mobilePhotoWallRaf)return;

  mobilePhotoWallLastTs=null;

  function tick(ts){
    var parts=preparePhotoWallAutoScroll();

    if(parts){
      var track=parts.track;
      var loopWidth=getPhotoWallLoopWidth(track);

      if(loopWidth>60){
        if(mobilePhotoWallLastTs===null)mobilePhotoWallLastTs=ts;

        var dt=Math.min(64,ts-mobilePhotoWallLastTs);
        mobilePhotoWallLastTs=ts;

        var x=Number(track.dataset.bsuWallX||"0");
        if(!Number.isFinite(x))x=0;

        var speed=isMobile()?28:22;
        x+=(speed*dt)/1000;
        if(x>=loopWidth){
          x=x-loopWidth;
        }

        track.dataset.bsuWallX=String(x);
        track.style.setProperty("transform","translate3d("+(-x)+"px,0,0)","important");
      }else{
        mobilePhotoWallLastTs=null;
      }
    }else{
      mobilePhotoWallLastTs=null;
    }

    mobilePhotoWallRaf=requestAnimationFrame(tick);
  }

  mobilePhotoWallRaf=requestAnimationFrame(tick);
}

function restartPhotoWallAutoScroll(){
  stopMobilePhotoWallCarousel();
  preparePhotoWallAutoScroll();
  startPhotoWallAutoScroll();
}

function schedulePhotoWallAutoScroll(){
  startPhotoWallAutoScroll();

  if(mobilePhotoWallRestartTimer){
    clearTimeout(mobilePhotoWallRestartTimer);
  }

  mobilePhotoWallRestartTimer=setTimeout(function(){
    mobilePhotoWallRestartTimer=null;
    restartPhotoWallAutoScroll();
  },260);

  [80,220,520,900,1500,2400,3600,5200,7600,10500].forEach(function(ms){
    setTimeout(function(){
      preparePhotoWallAutoScroll();
      startPhotoWallAutoScroll();
    },ms);
  });
}

    img.addEventListener("load",function(){

    });

}

      var originalSetGalleryStaff=window.bsuSetGalleryStaff;
      window.__bsuGalleryAutoStartPatched=true;

      window.bsuSetGalleryStaff=function(){
        var result=originalSetGalleryStaff.apply(this,arguments);
        if(arguments&&arguments.length){ lastGalleryStaff=String(arguments[0]||lastGalleryStaff||""); }
        updatePhotoWorkLabel();
        schedulePhotoWallAutoScroll();
        setTimeout(schedulePhotoWallAutoScroll,120);
        setTimeout(schedulePhotoWallAutoScroll,500);
        setTimeout(schedulePhotoWallAutoScroll,1200);
        return result;

      schedulePhotoWallAutoScroll();
      clearInterval(window.__bsuGalleryAutoStartPatchTimer);

    }
  },80);

  setTimeout(function(){
    if(window.__bsuGalleryAutoStartPatchTimer){
      clearInterval(window.__bsuGalleryAutoStartPatchTimer);
      window.__bsuGalleryAutoStartPatchTimer=null;
    }
    schedulePhotoWallAutoScroll();

function getSelectedStaffName(){
  var el=document.querySelector(".staff-item.is-active .staff-name")||document.querySelector(".staff-card.is-active .staff-name");
  return el?(el.textContent||"").trim():"";
}

function getDateText(){
  var el=document.querySelector(".date-nav")||document.querySelector(".date-area");
  return el?(el.textContent||""):"";
}

function parseDisplayDate(){
  var m=getDateText().match(/(\\d{1,2})\\s*\\/\\s*(\\d{1,2})/);
  if(!m)return null;
  var now=new Date();
  var y=now.getFullYear();
  var dt=new Date(y,Number(m[1])-1,Number(m[2]));
  if(dt.getTime()<now.getTime()-15552000000)dt.setFullYear(y+1);
  return dt;
}

function staffWorksOn(name,dt){
  var days=WORK_DAYS[name];
  if(!days||!dt)return true;
  return days.indexOf(DAY_KEYS[dt.getDay()])>-1;
}

function nextWorkLabel(name,dt){
  var days=WORK_DAYS[name];
  if(!days||!dt)return"";
  for(var i=1;i<=14;i++){
    var n=new Date(dt);
    n.setDate(dt.getDate()+i);
    if(days.indexOf(DAY_KEYS[n.getDay()])>-1){
      return DAY_LABELS[n.getDay()]+" "+(n.getMonth()+1)+"/"+n.getDate();
    }
  }
  return"";
}

function fixOffDayFullyBookedStatus(){
  var dt=parseDisplayDate();
  if(!dt)return;

  document.querySelectorAll(".staff-item,.staff-card").forEach(function(card){
    var n=card.querySelector(".staff-name");
    var s=card.querySelector(".staff-status");
    if(!n||!s)return;

    var name=(n.textContent||"").trim();
    var txt=(s.textContent||"").trim();

    if(!name||!/fully booked/i.test(txt))return;

    if(!staffWorksOn(name,dt)){
      var label=nextWorkLabel(name,dt);
      if(label){
        s.textContent=label;
        s.style.setProperty("background","#f2f2f2","important");
        s.style.setProperty("color","#666","important");
        s.style.setProperty("font-weight","900","important");
      }
    }
  });
}

function syncGalleryToSelectedStaff(){
  var name=getSelectedStaffName();
  if(!name)return;
  window.bsuInitialGalleryStaff=name;

  if(name===lastGalleryStaff)return;

  if(window.bsuSetGalleryStaff){
    lastGalleryStaff=name;
    window.bsuSetGalleryStaff(name);
  }
}

function hasTimeButtons(slotArea){
  if(!slotArea)return false;
  var buttons=Array.from(slotArea.querySelectorAll(".time-btn"));
  return buttons.some(function(btn){
    return !btn.disabled&&(btn.textContent||"").trim().length>0;
  });
}

function hasLoadingFrame(slotArea){
  return !!(slotArea&&slotArea.querySelector&&slotArea.querySelector(".bsu-availability-loading-frame"));
}

function currentResultsAnchor(){
  var slotArea=document.querySelector(".desktop-right-panel .slot-area")||document.querySelector(".desktop-results-area .slot-area")||document.querySelector(".slot-area");
  var emptyState=document.querySelector(".desktop-right-panel .empty-state")||document.querySelector(".desktop-results-area .empty-state")||document.querySelector(".empty-state");

  if(hasLoadingFrame(slotArea)||hasTimeButtons(slotArea)){
    return slotArea;
  }

  if(emptyState&&emptyState.classList&&emptyState.classList.contains("is-visible")){
    return emptyState;
  }

  return slotArea||emptyState;
}

function movePhotoWall(){
  var photo=document.querySelector(".desktop-photo-wall-section");
  var booking=document.querySelector(".booking-layout");
  if(!photo||!booking)return;

  if(isMobile()){
    var anchor=currentResultsAnchor();
    if(anchor&&anchor.parentNode&&photo.previousElementSibling!==anchor){
      anchor.parentNode.insertBefore(photo,anchor.nextSibling);
      waitForMobilePhotoWallReady();
    }
  }else{
    if(photo.parentNode!==booking){
      booking.appendChild(photo);
    }
  }
}

function moveServicesForDesktop(){
  var resultsArea=document.querySelector(".desktop-results-area");
  var servicePills=document.querySelector(".service-pills");
  var slotArea=document.querySelector(".desktop-results-area .slot-area")||document.querySelector(".desktop-right-panel .slot-area")||document.querySelector(".slot-area");
  var emptyState=document.querySelector(".desktop-results-area .empty-state")||document.querySelector(".desktop-right-panel .empty-state")||document.querySelector(".empty-state");

  if(!resultsArea||!servicePills)return;

  var desktop=!isMobile();

  var serviceLabel=Array.from(document.querySelectorAll(".section-label")).find(function(el){
    return /services/i.test(el.textContent||"")&&!el.closest(".desktop-service-panel");
  })||document.querySelector(".desktop-service-panel .section-label");

  var message=document.querySelector(".message");

  var panel=document.querySelector(".desktop-service-panel")||document.createElement("div");
  panel.className="desktop-service-panel";

  var rightPanel=document.querySelector(".desktop-right-panel")||document.createElement("div");
  rightPanel.className="desktop-right-panel";

  var placeholder=document.querySelector(".desktop-service-placeholder");
  var slotPlaceholder=document.querySelector(".desktop-slot-placeholder");
  var emptyPlaceholder=document.querySelector(".desktop-empty-placeholder");

  if(!placeholder&&serviceLabel&&serviceLabel.parentNode){
    placeholder=document.createElement("div");
    placeholder.className="desktop-service-placeholder";
    serviceLabel.parentNode.insertBefore(placeholder,serviceLabel);
  }

  if(!slotPlaceholder&&slotArea&&slotArea.parentNode){
    slotPlaceholder=document.createElement("div");
    slotPlaceholder.className="desktop-slot-placeholder";
    slotArea.parentNode.insertBefore(slotPlaceholder,slotArea);
  }

  if(!emptyPlaceholder&&emptyState&&emptyState.parentNode){
    emptyPlaceholder=document.createElement("div");
    emptyPlaceholder.className="desktop-empty-placeholder";
    emptyState.parentNode.insertBefore(emptyPlaceholder,emptyState);
  }

  if(desktop){
    if(!rightPanel.parentNode){
      resultsArea.insertBefore(rightPanel,resultsArea.firstChild);
    }

    if(panel.parentNode!==rightPanel){
      rightPanel.appendChild(panel);
    }

    if(serviceLabel&&serviceLabel.parentNode!==panel){
      panel.appendChild(serviceLabel);
    }

    if(servicePills.parentNode!==panel){
      panel.appendChild(servicePills);
    }

    if(message&&message.parentNode!==panel){
      panel.appendChild(message);
    }

    if(slotArea&&slotArea.parentNode!==rightPanel){
      rightPanel.appendChild(slotArea);
    }

    if(emptyState&&emptyState.parentNode!==rightPanel){
      rightPanel.appendChild(emptyState);
    }

    var showTimes=hasTimeButtons(slotArea);
    var loading=hasLoadingFrame(slotArea);
    var emptyVisible=emptyState&&emptyState.classList&&emptyState.classList.contains("is-visible");

    setImportantDisplay(slotArea,(showTimes||loading)?"block":"none");
    setImportantDisplay(emptyState,(!showTimes&&!loading&&emptyVisible)?"block":"none");
  }else{
    if(placeholder&&placeholder.parentNode){
      if(serviceLabel&&serviceLabel.parentNode!==placeholder.parentNode){
        placeholder.parentNode.insertBefore(serviceLabel,placeholder.nextSibling);
      }

      if(servicePills.parentNode!==placeholder.parentNode){
        placeholder.parentNode.insertBefore(servicePills,serviceLabel?serviceLabel.nextSibling:placeholder.nextSibling);
      }

      if(message&&message.parentNode!==placeholder.parentNode){
        placeholder.parentNode.insertBefore(message,servicePills.nextSibling);
      }
    }

    if(slotPlaceholder&&slotPlaceholder.parentNode&&slotArea&&slotArea.parentNode!==slotPlaceholder.parentNode){
      slotPlaceholder.parentNode.insertBefore(slotArea,slotPlaceholder.nextSibling);
    }

    if(emptyPlaceholder&&emptyPlaceholder.parentNode&&emptyState&&emptyState.parentNode!==emptyPlaceholder.parentNode){
      emptyPlaceholder.parentNode.insertBefore(emptyState,emptyPlaceholder.nextSibling);
    }

    if(slotArea)slotArea.style.removeProperty("display");
    if(emptyState)emptyState.style.removeProperty("display");
  }
}

function removeOpeningCounts(){

    if(text!==newText){
      el.textContent=newText;
    }
  });
}

function formatPhotoWorkLabelName(name){

function updatePhotoWorkLabel(){
  var photo=document.querySelector(".desktop-photo-wall-section");
  if(!photo||!photo.parentNode)return;

  var label=document.querySelector(".bsu-photo-wall-label");
  if(!label){
    label=document.createElement("div");
    label.className="bsu-photo-wall-label";
  }

  var name=getSelectedStaffName()||lastGalleryStaff||window.bsuInitialGalleryStaff||"";

  if(label.parentNode!==photo.parentNode||label.nextSibling!==photo){
    photo.parentNode.insertBefore(label,photo);
  }
}
