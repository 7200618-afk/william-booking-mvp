<body>

  <script>
    (async function () {

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `

        const customJs = `
<script>
(function () {
  /* Put address + links into a real separate row under Open Hour */
  function fixHeaderRows() {
    const header = document.querySelector(".pasadena-header");
    const open = document.querySelector(".pasadena-open");
    const address = document.querySelector(".pasadena-address");
    const links = document.querySelector(".pasadena-links");

    if (!header || !open || !address || !links) return;

    let row = document.querySelector(".pasadena-address-row");

    if (!row) {
      row = document.createElement("div");
      row.className = "pasadena-address-row";

      if (open.nextSibling) {
        open.parentNode.insertBefore(row, open.nextSibling);
      } else {
        open.parentNode.appendChild(row);
      }

      row.appendChild(address);
      row.appendChild(links);
    }
  }

  fixHeaderRows();

  const headerObserver = new MutationObserver(fixHeaderRows);
  headerObserver.observe(document.body, {
    childList: true,
    subtree: true
  });

  /* Remove Morning · 2 openings / Afternoon · 1 opening */
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      let text = el.textContent || "";

      text = text
        .replace(/\\s*·\\s*\\d+\\s*openings?/gi, "")
        .replace(/\\s*·\\s*\\d+\\s*opening/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*openings?\\s*\\)/gi, "")
        .replace(/\\s*\\(\\s*\\d+\\s*opening\\s*\\)/gi, "")
        .trim();

      if (el.textContent !== text) {
        el.textContent = text;
      }
    });
  }

  function startOpeningCountCleaner() {
    removeOpeningCounts();

    setTimeout(removeOpeningCounts, 100);
    setTimeout(removeOpeningCounts, 300);
    setTimeout(removeOpeningCounts, 700);
    setTimeout(removeOpeningCounts, 1200);

    const observer = new MutationObserver(function () {
      removeOpeningCounts();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });

    document.addEventListener("click", function () {
      setTimeout(removeOpeningCounts, 50);
      setTimeout(removeOpeningCounts, 250);
      setTimeout(removeOpeningCounts, 600);
    }, true);
  }

  startOpeningCountCleaner();

  /* Gallery modal */
  function createGalleryModal() {
    let modal = document.getElementById("bsuGalleryModal");

    if (modal) return modal;

    modal = document.createElement("div");
    modal.id = "bsuGalleryModal";
    modal.className = "bsu-gallery-modal";
    modal.innerHTML = \`
      <div class="bsu-gallery-modal-inner">
        <button class="bsu-gallery-modal-close" type="button" aria-label="Close">×</button>
        <div id="bsuGalleryModalStage"></div>
      </div>
    \`;

    document.body.appendChild(modal);

    modal.addEventListener("click", function (event) {
      if (
        event.target === modal ||
        event.target.classList.contains("bsu-gallery-modal-close")
      ) {
        closeGalleryModal();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeGalleryModal();
      }
    });

    return modal;
  }

  function closeGalleryModal() {
    const modal = document.getElementById("bsuGalleryModal");
    const stage = document.getElementById("bsuGalleryModalStage");

    if (stage) {
      stage.innerHTML = "";
    }

    if (modal) {
      modal.classList.remove("is-open");
    }
  }

  function openGalleryModal(media) {
    const modal = createGalleryModal();
    const stage = document.getElementById("bsuGalleryModalStage");

    if (!media || !stage) return;

    const src =
      media.currentSrc ||
      media.src ||
      media.getAttribute("data-src") ||
      media.getAttribute("poster") ||
      "";

    if (!src) return;

    const tagName = media.tagName.toLowerCase();

    const isVideo =
      tagName === "video" ||
      /\\.(mp4|mov|webm)(\\?|$)/i.test(src);

    stage.innerHTML = isVideo
      ? \`<video src="\${src}" controls autoplay playsinline></video>\`
      : \`<img src="\${src}" alt="B SIDE U work">\`;

    modal.classList.add("is-open");
  }

  document.addEventListener(
    "click",
    function (event) {
      const gallery = document.getElementById("bsu-gallery");
      if (!gallery) return;

      const item = event.target.closest(
        ".staff-carousel-item, .grid-item, .g-media, #bsu-gallery img, #bsu-gallery video"
      );

      if (!item || !gallery.contains(item)) return;

      const media = item.matches("img, video")
        ? item
        : item.querySelector("img, video");

      if (!media) return;

      event.preventDefault();
      event.stopPropagation();

      openGalleryModal(media);
    },
    true
  );
})();
<\\/script>
`;

        html = html.replace("</style>", "\n" + customCss + "\n</style>");

      }
    })();
  </script>
