<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    html,
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .bsu-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="bsu-loading">Loading B SIDE U booking...</div>

  <script>
    (async function () {
      const sourceUrl =
        "https://raw.githubusercontent.com/7200618-afk/william-booking-mvp/41b5a444c3ada20bc9d620047297643db44dcc17/index.html";

      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Unable to load booking page.");
        }

        let html = await response.text();

        const customCss = `
/* ===============================
   B SIDE U Custom Fixes
   =============================== */

/* Remove View Profile under staff avatars */
.profile-link-under-card,
.staff-item.is-active .profile-link-under-card {
  display: none !important;
}

/* Open hour must be its own line */
.pasadena-open {
  display: flex !important;
  width: max-content !important;
  max-width: 100% !important;
  margin-bottom: 12px !important;
}

/* Address + buttons row */
.pasadena-address-row {
  display: flex !important;
  align-items: center !important;
  gap: 14px !important;
  flex-wrap: wrap !important;
  margin-top: 0 !important;
  position: relative !important;
  z-index: 2 !important;
  width: 100% !important;
}

.pasadena-address-row .pasadena-address {
  display: inline-flex !important;
  align-items: center !important;
  width: auto !important;
  max-width: none !important;
  margin: 0 !important;
  line-height: 1.45 !important;
}

.pasadena-address-row .pasadena-links {
  display: inline-flex !important;
  width: auto !important;
  margin: 0 !important;
  gap: 8px !important;
  flex-wrap: wrap !important;
}

/* Mobile */
@media (max-width: 600px) {
  .pasadena-open {
    display: flex !important;
    width: max-content !important;
    max-width: 100% !important;
    margin-bottom: 10px !important;
  }

  .pasadena-address-row {
    display: block !important;
    margin-top: 0 !important;
  }

  .pasadena-address-row .pasadena-address {
    display: block !important;
    width: 100% !important;
    margin: 0 0 8px !important;
  }

  .pasadena-address-row .pasadena-links {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    width: 100% !important;
    margin: 10px 0 0 !important;
  }
}

/* Remove outer frame around calendar/date area */
.date-area {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
}

.date-area.is-fixed-fallback {
  border: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
}

/* Date arrow buttons: lighter design */
.date-nav {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid rgba(20, 20, 20, 0.12) !important;
  box-shadow: none !important;
}

.date-nav:hover {
  background: #f7f7f7 !important;
  box-shadow: none !important;
}
`;

        const customJs = `
<script>
(function () {
  /* Put address + links into a real separate row under Open Hour */
  function fixHeaderRows() {
    const open = document.querySelector(".pasadena-open");
    const address = document.querySelector(".pasadena-address");
    const links = document.querySelector(".pasadena-links");

    if (!open || !address || !links) return;

    let row = document.querySelector(".pasadena-address-row");

    if (!row) {
      row = document.createElement("div");
      row.className = "pasadena-address-row";

      if (open.nextSibling) {
        open.parentNode.insertBefore(row, open.nextSibling);
      } else {
        open.parentNode.appendChild(row);
      }

      row.appendChild(address);
      row.appendChild(links);
    }
  }

  fixHeaderRows();

  const headerObserver = new MutationObserver(fixHeaderRows);
  headerObserver.observe(document.body, {
    childList: true,
    subtree: true
  });

  /* Remove Morning · 2 openings / Afternoon · 1 opening */
  function removeOpeningCounts() {
    document.querySelectorAll(".slot-group-title").forEach(function (el) {
      let text = el.textContent || "";

      text = text
        .replace(/\\\\s*·\\\\s*\\\\d+\\\\s*openings?/gi, "")
        .replace(/\\\\s*\\\\(\\\\s*\\\\d+\\\\s*openings?\\\\s*\\\\)/gi, "")
        .trim();

      if (el.textContent !== text) {
        el.textContent = text;
      }
    });
  }

  function startOpeningCountCleaner() {
    removeOpeningCounts();

    setTimeout(removeOpeningCounts, 100);
    setTimeout(removeOpeningCounts, 300);
    setTimeout(removeOpeningCounts, 700);
    setTimeout(removeOpeningCounts, 1200);

    const observer = new MutationObserver(function () {
      removeOpeningCounts();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });

    document.addEventListener("click", function () {
      setTimeout(removeOpeningCounts, 50);
      setTimeout(removeOpeningCounts, 250);
      setTimeout(removeOpeningCounts, 600);
    }, true);
  }

  startOpeningCountCleaner();

  /* Change "No availability today" to "No availability with Staff Name" */
  function cleanStaffName(name) {
    return (name || "")
      .replace(/View Profile/gi, "")
      .replace(/Book Now/gi, "")
      .replace(/Haircut/gi, "")
      .replace(/Scissor Cut/gi, "")
      .replace(/Perm/gi, "")
      .replace(/Color/gi, "")
      .replace(/Bleach/gi, "")
      .replace(/\\\\s+/g, " ")
      .trim();
  }

  function getActiveStaffName() {
    const activeStaff =
      document.querySelector(".staff-item.is-active .staff-name") ||
      document.querySelector(".staff-item.is-active [class*='name']") ||
      document.querySelector(".staff-card.is-active .staff-name") ||
      document.querySelector(".staff-card.is-active [class*='name']") ||
      document.querySelector(".stylist-card.is-active .staff-name") ||
      document.querySelector(".stylist-card.is-active [class*='name']");

    if (activeStaff) {
      return cleanStaffName(activeStaff.textContent);
    }

    const activeCard =
      document.querySelector(".staff-item.is-active") ||
      document.querySelector(".staff-card.is-active") ||
      document.querySelector(".stylist-card.is-active") ||
      document.querySelector("[aria-selected='true']");

    if (activeCard) {
      const possibleName =
        activeCard.querySelector(".staff-name") ||
        activeCard.querySelector(".stylist-name") ||
        activeCard.querySelector("[class*='name']");

      if (possibleName) {
        return cleanStaffName(possibleName.textContent);
      }

      return cleanStaffName(activeCard.textContent);
    }

    return "";
  }

  function updateNoAvailabilityText() {
    const staffName = getActiveStaffName();

    if (!staffName) return;

    document.querySelectorAll("h1, h2, h3, div, p, span").forEach(function (el) {
      const text = (el.textContent || "").trim();

      if (text === "No availability today") {
        el.textContent = "No availability with " + staffName;
      }

      if (/^No availability with /i.test(text) && text !== "No availability with " + staffName) {
        el.textContent = "No availability with " + staffName;
      }
    });
  }

  function startNoAvailabilityTextUpdater() {
    updateNoAvailabilityText();

    setTimeout(updateNoAvailabilityText, 100);
    setTimeout(updateNoAvailabilityText, 300);
    setTimeout(updateNoAvailabilityText, 700);
    setTimeout(updateNoAvailabilityText, 1200);

    const observer = new MutationObserver(function () {
      updateNoAvailabilityText();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });

    document.addEventListener("click", function () {
      setTimeout(updateNoAvailabilityText, 80);
      setTimeout(updateNoAvailabilityText, 300);
      setTimeout(updateNoAvailabilityText, 700);
    }, true);
  }

  startNoAvailabilityTextUpdater();
})();
<\\/script>
`;

        html = html.replace("</style>", "\n" + customCss + "\n</style>");
        html = html.replace("</body>", customJs + "\n</body>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML =
          '<div class="bsu-loading">Unable to load booking page. Please refresh.</div>';
      }
    })();
  </script>
</body>
</html>
