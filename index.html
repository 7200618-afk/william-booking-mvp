<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #fafafa;
      --ink: #141414;
      --muted: #666666;
      --line: rgba(20,20,20,0.10);
      --line-strong: rgba(20,20,20,0.18);
      --brand: #141414;
      --brand-soft: #f4f4f4;
      --accent: #111111;
      --success: #147a3f;
      --danger: #b42318;
      --shadow-sm: 0 5px 18px rgba(0,0,0,0.045);
      --shadow-md: 0 14px 38px rgba(0,0,0,0.075);
      --shadow-lg: 0 24px 72px rgba(0,0,0,0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --ease: cubic-bezier(.2,.8,.2,1);
    }

    * { box-sizing: border-box; }

    html {
      background: #ffffff;
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      touch-action: manipulation;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 14px 36px;
    }

    .pasadena-header {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(20,20,20,0.08);
      border-radius: var(--radius-xl);
      padding: 22px 18px 18px;
      margin-bottom: 16px;
      background: #ffffff;
      box-shadow: var(--shadow-md);
    }

    .pasadena-header::before {
      display: none;
    }

    .pasadena-header::after {
      content: "";
      position: absolute;
      right: -58px;
      bottom: -72px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(20,20,20,0.045);
      pointer-events: none;
    }

    .pasadena-title {
      position: relative;
      z-index: 1;
      font-size: clamp(25px, 6.4vw, 44px);
      line-height: 0.92;
      font-weight: 950;
      margin: 24px 0 14px;
      letter-spacing: -0.065em;
      max-width: 720px;
