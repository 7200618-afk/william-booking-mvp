<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B SIDE U Pasadena Booking</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    .page {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 10px;
      padding-bottom: 30px;
    }

    .header {
      padding: 6px 2px 10px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.05;
      margin: 0 0 4px;
      letter-spacing: -0.6px;
      font-weight: 900;
    }

    .sub {
      color: #666;
      font-size: 13px;
      line-height: 1.3;
      margin: 0;
    }

    .top-card,
    .slot-card {
      border: 1px solid #e8e8e8;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 5px 18px rgba(0,0,0,0.035);
    }

    .top-card {
      padding: 10px;
    }

    .date-bar {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      gap: 8px;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .date-nav {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 9px;
      background: #000;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .date-center {
      position: relative;
      text-align: center;
      min-width: 0;
    }

    .date-label {
      font-size: 15px;
      font-weight: 900;
      line-height: 34px;
      border-radius: 9px;
      background: #f7f7f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
    }

    #dateInput {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .section-label {
      font-size: 11px;
      color: #666;
      font-weight: 900;
      letter-spacing: 0.45px;
      text-transform: uppercase;
      margin: 11px 0 7px;
    }

    .staff-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 1px 1px 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .staff-strip::-webkit-scrollbar {
      height: 3px;
    }

    .staff-strip::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 999px;
    }

    .staff-card {
      flex: 0 0 78px;
      min-height: 118px;
      border: 1px solid #e6e6e6;
      border-radius: 14px;
      background: #fff;
      padding: 8px 5px;
      text-align: center;
      cursor: pointer;
      scroll-snap-align: start;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .staff-card:active {
      transform: scale(0.98);
    }

    .staff-card.is-active {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .staff-card.is-off {
      opacity: 0.66;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin: 0 auto 6px;
      background: #eee;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      color: #111;
    }

    .staff-card.is-active .avatar {
      background: #fff;
      color: #111;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .staff-name {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.1;
    }

    .staff-status {
      margin-top: 5px;
      font-size: 10px;
      font-weight: 900;
      color: #777;
      line-height: 1.15;
      min-height: 24px;
    }

    .staff-card.is-working .staff-status {
      color: #16833d;
    }

    .staff-card.is-active .staff-status {
      color: #ddd;
    }

    .staff-card.is-active.is-working .staff-status {
      color: #bff0cd;
    }

    .selected-staff-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 4px 2px 2px;
      margin-top: -2px;
    }

    .selected-staff-name {
      font-size: 13px;
      color: #666;
      font-weight: 800;
    }

    .profile-link {
      color: #111;
      font-size: 13px;
      font-weight: 900;
      text-decoration: underline;
      white-space: nowrap;
    }

    .service-pills {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 0 1px 2px;
      -webkit-overflow-scrolling: touch;
    }

    .service-pill {
      flex: 0 0 auto;
      border: 1px solid #ddd;
      border-radius: 999px;
      background: #fff;
      color: #111;
      padding: 9px 11px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .service-pill.is-active {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .message {
      min-height: 18px;
      margin-top: 6px;
      color: #666;
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .empty-state {
      display: none;
      margin-top: 8px;
      border: 1px solid #e8e8e8;
      border-radius: 13px;
      padding: 10px;
      background: #fafafa;
    }

    .empty-state.is-visible {
      display: block;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .empty-sub {
      font-size: 12px;
      color: #666;
      line-height: 1.35;
      margin-bottom: 9px;
    }

    .next-available-btn {
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 10px;
      background: #000;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .slot-card {
      display: none;
      margin-top: 10px;
      padding: 10px;
    }

    .slot-card.is-visible {
      display: block;
    }

    .slot-topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 10px;
    }

    .slot-title {
      font-size: 18px;
      font-weight: 900;
      margin: 0;
    }

    .slot-count {
      font-size: 12px;
      font-weight: 900;
      color: #666;
      white-space: nowrap;
    }

    .slot-group {
      margin-top: 14px;
    }

    .slot-group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 900;
      color: #111;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .slot-group-title::after {
      content: "";
      height: 1px;
      background: #eee;
      flex: 1;
    }

    .times {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .time-btn {
      min-height: 43px;
      border: 1px solid #111;
      border-radius: 10px;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 0 4px;
    }

    .time-btn.is-selected {
      background: #000;
      color: #fff;
    }

    .selected-panel {
      display: none;
      margin-top: 14px;
      border: 1px solid #111;
      border-radius: 14px;
      padding: 12px;
      background: #fafafa;
    }

    .selected-panel.is-visible {
      display: block;
    }

    .selected-label {
      font-size: 11px;
      color: #666;
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .selected-time {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .selected-detail {
      color: #666;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .continue-btn {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 11px;
      background: #000;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .note {
      margin-top: 8px;
      color: #777;
      font-size: 12px;
      line-height: 1.3;
    }

    @media (min-width: 641px) {
      .page {
        padding-top: 24px;
      }

      .staff-card {
        flex-basis: 88px;
      }

      .time-btn {
        min-height: 48px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <h1>Book Pasadena</h1>
      <p class="sub">Pick a stylist, choose a service, and select an available time.</p>
    </div>

    <div class="top-card">
      <div class="date-bar">
        <button id="prevDay" class="date-nav" type="button">‹</button>

        <div class="date-center">
          <div id="dateLabel" class="date-label">Today</div>
          <input id="dateInput" type="date" />
        </div>

        <button id="nextDay" class="date-nav" type="button">›</button>
      </div>

      <div class="section-label">Stylists</div>
      <div id="staffStrip" class="staff-strip"></div>

      <div class="selected-staff-row">
        <div id="selectedStaffName" class="selected-staff-name"></div>
        <a id="profileLink" class="profile-link" href="#" target="_blank" rel="noopener noreferrer">View Profile</a>
      </div>

      <div class="section-label">Services</div>
      <div id="servicePills" class="service-pills"></div>

      <div id="message" class="message"></div>

      <div id="emptyState" class="empty-state">
        <div id="emptyTitle" class="empty-title"></div>
        <div id="emptySub" class="empty-sub"></div>
        <button id="nextAvailableBtn" class="next-available-btn" type="button">
          Go to next available date
        </button>
      </div>
    </div>

    <div id="slotCard" class="slot-card">
      <div class="slot-topline">
        <h2 class="slot-title">Available Times</h2>
        <div id="slotCount" class="slot-count"></div>
      </div>

      <div id="slotGroups"></div>

      <div id="selectedPanel" class="selected-panel">
        <div class="selected-label">Selected appointment</div>
        <div id="selectedTime" class="selected-time"></div>
        <div id="selectedDetail" class="selected-detail"></div>
        <button id="continueBtn" class="continue-btn">Continue</button>
        <div class="note">Next step: customer name, phone, and email.</div>
      </div>
    </div>
  </div>

  <script>
    const daysShort = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
    const daysDisplay = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const STAFF_DATA = {
      William: {
        name: "William",
        order: 1,
        startDate: "2026-05-27",
        days: ["mon", "thu", "fri", "sat", "sun"],
        image: "",
        defaultService: "haircut",
        services: {
          haircut: { label: "Men’s Haircut", price: 60, duration_minutes: 50 },
          scissors: { label: "Scissors Cut", price: 75, duration_minutes: 50 }
        }
      },

      Ryan: {
        name: "Ryan",
        order: 2,
        days: ["mon", "tue", "thu", "fri", "sat", "sun"],
        image: "https://images.editor.website/uploads/b/559d7de91ca0c03e99beec1fe8bb19300c68147e7c0e8b214d463495239f943c/123121212_1764920283.JPG?width=400&optimize=medium",
        defaultService: "haircut",
        services: {
          haircut: { label: "Men’s Haircut", price: 45, duration_minutes: 45 },
          scissors: { label: "Scissors Cut", price: 60, duration_minutes: 45 }
        }
      },

      Ken: {
        name: "Ken",
        order: 3,
        days: ["tue", "wed", "fri", "sat", "sun"],
        image: "https://appointments-production-f.squarecdn.com/files/8ab010be3ad4f51892e1c75509dc0572/original.jpeg",
        defaultService: "haircut",
        services: {
          haircut: { label: "Men’s Haircut", price: 50, duration_minutes: 40 },
          scissors: { label: "Scissors Cut", price: 70, duration_minutes: 40 }
        }
      },

      Fiona: {
        name: "Fiona",
        order: 4,
        days: ["mon", "tue", "wed", "fri", "sat"],
        image: "https://images.editor.website/uploads/b/559d7de91ca0c03e99beec1fe8bb19300c68147e7c0e8b214d463495239f943c/fiona_1744180262.jpeg",
        defaultService: "haircut",
        services: {
          haircut: { label: "Men’s Haircut", price: 55, duration_minutes: 40 },
          scissors: { label: "Scissors Cut", price: 70, duration_minutes: 40 },
          perm: { label: "Perm", price: "220+", duration_minutes: 120 },
          color_gray: { label: "Cover Gray", price: 65, duration_minutes: 40 },
          color_full: { label: "Full Color", price: 120, duration_minutes: 120 }
        }
      },

      Nami: {
        name: "Nami",
        order: 5,
        days: ["tue", "wed", "thu", "sun"],
        image: "https://images.editor.website/uploads/b/559d7de91ca0c03e99beec1fe8bb19300c68147e7c0e8b214d463495239f943c/nami_1744180260.jpeg",
        defaultService: "haircut",
        services: {
          haircut: { label: "Men’s Haircut", price: 55, duration_minutes: 50 },
          scissors: { label: "Scissors Cut", price: 70, duration_minutes: 50 }
        }
      },

      Jacob: {
        name: "Jacob",
        order: 999,
        days: ["wed", "thu", "fri", "sat"],
        image: "https://appointments-production-f.squarecdn.com/files/fa093c26c9f36366886b8ed1a776878a/original.jpeg",
        defaultService: "haircut",
        services: {
          haircut: { label: "Men’s Haircut", price: 60, duration_minutes: 45 },
          scissors: { label: "Scissors Cut", price: 75, duration_minutes: 45 }
        }
      }
    };

    const staffStripEl = document.getElementById("staffStrip");
    const selectedStaffNameEl = document.getElementById("selectedStaffName");
    const profileLinkEl = document.getElementById("profileLink");
    const servicePillsEl = document.getElementById("servicePills");
    const dateInputEl = document.getElementById("dateInput");
    const dateLabelEl = document.getElementById("dateLabel");
    const prevDayBtn = document.getElementById("prevDay");
    const nextDayBtn = document.getElementById("nextDay");
    const messageEl = document.getElementById("message");
    const emptyStateEl = document.getElementById("emptyState");
    const emptyTitleEl = document.getElementById("emptyTitle");
    const emptySubEl = document.getElementById("emptySub");
    const nextAvailableBtn = document.getElementById("nextAvailableBtn");
    const slotCardEl = document.getElementById("slotCard");
    const slotCountEl = document.getElementById("slotCount");
    const slotGroupsEl = document.getElementById("slotGroups");
    const selectedPanelEl = document.getElementById("selectedPanel");
    const selectedTimeEl = document.getElementById("selectedTime");
    const selectedDetailEl = document.getElementById("selectedDetail");
    const continueBtn = document.getElementById("continueBtn");

    let currentDate = new Date();
    let selectedStaffKey = "";
    let selectedServiceKey = "";
    let selectedSlot = null;
    let statusRequestId = 0;
    let nextAvailableTargetDate = null;

    function toIsoDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function fromIsoDateLocal(value) {
      const [y, m, d] = value.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDateLabel(date) {
      const todayIso = toIsoDateLocal(new Date());
      const dateIso = toIsoDateLocal(date);
      const dow = daysDisplay[date.getDay()];
      const md = `${date.getMonth() + 1}/${date.getDate()}`;

      if (dateIso === todayIso) return `Today · ${dow} ${md}`;
      return `${dow} ${md}`;
    }

    function formatShortDate(date) {
      const dow = daysDisplay[date.getDay()];
      return `${dow} ${date.getMonth() + 1}/${date.getDate()}`;
    }

    function updateDateUI() {
      dateInputEl.value = toIsoDateLocal(currentDate);
      dateLabelEl.textContent = formatDateLabel(currentDate);
    }

    function hasStarted(staffKey, date) {
      const staff = STAFF_DATA[staffKey];
      if (!staff.startDate) return true;
      return toIsoDateLocal(date) >= staff.startDate;
    }

    function isWorking(staffKey, date) {
      const staff = STAFF_DATA[staffKey];

      if (!hasStarted(staffKey, date)) return false;

      const dow = daysShort[date.getDay()];
      return staff.days.includes(dow);
    }

    function getOrderedStaffKeys(date) {
      const keys = Object.keys(STAFF_DATA).filter(key => key !== "Jacob");

      const working = keys
        .filter(key => isWorking(key, date))
        .sort((a, b) => STAFF_DATA[a].order - STAFF_DATA[b].order);

      const off = keys
        .filter(key => !isWorking(key, date))
        .sort((a, b) => STAFF_DATA[a].order - STAFF_DATA[b].order);

      return [...working, ...off, "Jacob"];
    }

    function getProfileUrl(staffKey) {
      return `https://bsideuhair.com/${encodeURIComponent(staffKey.toLowerCase())}`;
    }

    function formatPrice(price) {
      return typeof price === "string" ? `$${price}` : `$${price}`;
    }

    function formatPasadenaTime(utcString) {
      const date = new Date(utcString);

      return date.toLocaleTimeString("en-US", {
        timeZone: "America/Los_Angeles",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function getPasadenaHour(utcString) {
      const date = new Date(utcString);

      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Los_Angeles",
        hour: "numeric",
        hour12: false
      }).formatToParts(date);

      const hourPart = parts.find(part => part.type === "hour");
      return Number(hourPart.value);
    }

    function getSlotGroupName(utcString) {
      const hour = getPasadenaHour(utcString);
      if (hour < 12) return "Morning";
      if (hour < 17) return "Afternoon";
      return "Evening";
    }

    function getNextWorkingDate(staffKey, fromDate) {
      for (let i = 0; i <= 45; i++) {
        const d = new Date(fromDate);
        d.setDate(d.getDate() + i);

        if (isWorking(staffKey, d)) return d;
      }

      return null;
    }

    async function fetchAvailabilityFor(staffKey, serviceType, dateObj) {
      const response = await fetch("/api/search-availability", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          staffKey,
          serviceType,
          date: toIsoDateLocal(dateObj)
        })
      });

      const data = await response.json();

      if (!response.ok) {
        return [];
      }

      return data.availabilities || [];
    }

    async function fetchFirstOpening(staffKey, dateObj) {
      const staff = STAFF_DATA[staffKey];
      const serviceType = staff.defaultService;
      const openings = await fetchAvailabilityFor(staffKey, serviceType, dateObj);

      if (!openings.length) return null;

      return openings[0].start_at;
    }

    async function findNextAvailableDate(staffKey, serviceType, fromDate, startTomorrow) {
      for (let i = startTomorrow ? 1 : 0; i <= 45; i++) {
        const d = new Date(fromDate);
        d.setDate(d.getDate() + i);

        if (!hasStarted(staffKey, d)) continue;
        if (!isWorking(staffKey, d)) continue;

        const openings = await fetchAvailabilityFor(staffKey, serviceType, d);

        if (openings.length) {
          return {
            date: d,
            firstOpening: openings[0].start_at,
            openings
          };
        }
      }

      return null;
    }

    function showEmptyState(title, sub, nextResult) {
      emptyTitleEl.textContent = title;
      emptySubEl.textContent = sub || "";

      if (nextResult && nextResult.date) {
        nextAvailableTargetDate = nextResult.date;

        nextAvailableBtn.style.display = "block";
        nextAvailableBtn.textContent =
          `Next available · ${formatShortDate(nextResult.date)} · ${formatPasadenaTime(nextResult.firstOpening)}`;
      } else {
        nextAvailableTargetDate = null;
        nextAvailableBtn.style.display = "none";
      }

      emptyStateEl.classList.add("is-visible");
    }

    async function loadStaffStatuses(requestId) {
      const cards = document.querySelectorAll(".staff-card");

      cards.forEach(card => {
        const staffKey = card.dataset.staffKey;
        const statusEl = card.querySelector(".staff-status");

        if (!statusEl) return;

        if (!hasStarted(staffKey, currentDate)) {
          statusEl.textContent = "Starts 5/27";
          return;
        }

        const nextWorkingDate = getNextWorkingDate(staffKey, currentDate);

        if (!nextWorkingDate) {
          statusEl.textContent = "No schedule";
          return;
        }

        statusEl.textContent = "Checking...";
      });

      for (const card of cards) {
        if (requestId !== statusRequestId) return;

        const staffKey = card.dataset.staffKey;
        const statusEl = card.querySelector(".staff-status");

        if (!statusEl) continue;
        if (!hasStarted(staffKey, currentDate)) continue;

        const nextWorkingDate = getNextWorkingDate(staffKey, currentDate);
        if (!nextWorkingDate) continue;

        try {
          const firstOpening = await fetchFirstOpening(staffKey, nextWorkingDate);

          if (requestId !== statusRequestId) return;

          if (firstOpening) {
            statusEl.textContent = `${formatShortDate(nextWorkingDate)} · ${formatPasadenaTime(firstOpening)}`;
          } else {
            if (isWorking(staffKey, currentDate)) {
              statusEl.textContent = "Fully booked";
            } else {
              statusEl.textContent = `${formatShortDate(nextWorkingDate)} · Full`;
            }
          }
        } catch (error) {
          if (requestId !== statusRequestId) return;
          statusEl.textContent = `${formatShortDate(nextWorkingDate)}`;
        }
      }
    }

    function updateSelectedStaffRow() {
      const staff = STAFF_DATA[selectedStaffKey];

      selectedStaffNameEl.textContent = staff.name;
      profileLinkEl.href = getProfileUrl(selectedStaffKey);
    }

    function clearResults() {
      selectedSlot = null;
      nextAvailableTargetDate = null;
      messageEl.textContent = "";
      slotGroupsEl.innerHTML = "";
      slotCardEl.classList.remove("is-visible");
      selectedPanelEl.classList.remove("is-visible");
      emptyStateEl.classList.remove("is-visible");
    }

    function clearSelection() {
      selectedSlot = null;
      selectedPanelEl.classList.remove("is-visible");
      selectedTimeEl.textContent = "";
      selectedDetailEl.textContent = "";

      document.querySelectorAll(".time-btn").forEach(btn => {
        btn.classList.remove("is-selected");
      });
    }

    function renderStaffStrip() {
      staffStripEl.innerHTML = "";

      const orderedKeys = getOrderedStaffKeys(currentDate);

      if (!selectedStaffKey || !orderedKeys.includes(selectedStaffKey)) {
        selectedStaffKey = orderedKeys[0];
      }

      orderedKeys.forEach(staffKey => {
        const staff = STAFF_DATA[staffKey];
        const working = isWorking(staffKey, currentDate);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "staff-card";
        btn.dataset.staffKey = staffKey;

        if (staffKey === selectedStaffKey) btn.classList.add("is-active");
        if (working) btn.classList.add("is-working");
        else btn.classList.add("is-off");

        const avatarHTML = staff.image
          ? `<div class="avatar"><img src="${staff.image}" alt="${staff.name}"></div>`
          : `<div class="avatar">${staff.name.slice(0, 1)}</div>`;

        btn.innerHTML = `
          ${avatarHTML}
          <div class="staff-name">${staff.name}</div>
          <div class="staff-status">Loading...</div>
        `;

        btn.addEventListener("click", () => {
          selectedStaffKey = staffKey;
          selectedServiceKey = STAFF_DATA[staffKey].defaultService;

          renderStaffStrip();
          renderServicePills();
          updateSelectedStaffRow();
          clearResults();

          statusRequestId++;
          loadStaffStatuses(statusRequestId);

          searchAvailability();
        });

        staffStripEl.appendChild(btn);
      });

      updateSelectedStaffRow();

      statusRequestId++;
      loadStaffStatuses(statusRequestId);
    }

    function renderServicePills() {
      servicePillsEl.innerHTML = "";

      const staff = STAFF_DATA[selectedStaffKey];
      const serviceKeys = Object.keys(staff.services);

      if (!selectedServiceKey || !staff.services[selectedServiceKey]) {
        selectedServiceKey = staff.defaultService || serviceKeys[0];
      }

      serviceKeys.forEach(serviceKey => {
        const service = staff.services[serviceKey];

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "service-pill";

        if (serviceKey === selectedServiceKey) {
          btn.classList.add("is-active");
        }

        btn.textContent = `${service.label} · ${formatPrice(service.price)} · ${service.duration_minutes} min`;

        btn.addEventListener("click", () => {
          selectedServiceKey = serviceKey;
          renderServicePills();
          clearResults();
          searchAvailability();
        });

        servicePillsEl.appendChild(btn);
      });
    }

    function renderSlots(availabilities) {
      slotGroupsEl.innerHTML = "";
      clearSelection();

      const groups = {
        Morning: [],
        Afternoon: [],
        Evening: []
      };

      availabilities.forEach(slot => {
        const groupName = getSlotGroupName(slot.start_at);
        groups[groupName].push(slot);
      });

      Object.keys(groups).forEach(groupName => {
        const slots = groups[groupName];

        if (!slots.length) return;

        const groupEl = document.createElement("div");
        groupEl.className = "slot-group";

        const titleEl = document.createElement("div");
        titleEl.className = "slot-group-title";
        titleEl.textContent = groupName;

        const timesEl = document.createElement("div");
        timesEl.className = "times";

        slots.forEach(slot => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "time-btn";
          btn.textContent = formatPasadenaTime(slot.start_at);

          btn.addEventListener("click", () => {
            clearSelection();

            selectedSlot = slot;
            btn.classList.add("is-selected");

            const staff = STAFF_DATA[selectedStaffKey];
            const service = staff.services[selectedServiceKey];

            selectedTimeEl.textContent = formatPasadenaTime(slot.start_at);
            selectedDetailEl.textContent =
              `${staff.name} · ${service.label} · ${formatPrice(service.price)} · ${service.duration_minutes} min`;

            selectedPanelEl.classList.add("is-visible");
          });

          timesEl.appendChild(btn);
        });

        groupEl.appendChild(titleEl);
        groupEl.appendChild(timesEl);
        slotGroupsEl.appendChild(groupEl);
      });
    }

    async function searchAvailability() {
      if (!selectedStaffKey || !selectedServiceKey) return;

      const staff = STAFF_DATA[selectedStaffKey];
      const service = staff.services[selectedServiceKey];

      messageEl.textContent = "Checking available times...";
      slotGroupsEl.innerHTML = "";
      slotCardEl.classList.remove("is-visible");
      selectedPanelEl.classList.remove("is-visible");
      emptyStateEl.classList.remove("is-visible");

      try {
        if (!hasStarted(selectedStaffKey, currentDate)) {
          messageEl.textContent = "";

          const nextResult = await findNextAvailableDate(
            selectedStaffKey,
            selectedServiceKey,
            currentDate,
            false
          );

          showEmptyState(
            `${staff.name} starts on 5/27`,
            "Please choose 5/27 or later.",
            nextResult
          );

          return;
        }

        if (!isWorking(selectedStaffKey, currentDate)) {
          messageEl.textContent = "";

          const nextResult = await findNextAvailableDate(
            selectedStaffKey,
            selectedServiceKey,
            currentDate,
            true
          );

          showEmptyState(
            `${staff.name} is not working today`,
            nextResult
              ? `Next available for ${service.label}:`
              : `No available date found for ${service.label}.`,
            nextResult
          );

          return;
        }

        const availabilities = await fetchAvailabilityFor(
          selectedStaffKey,
          selectedServiceKey,
          currentDate
        );

        if (!availabilities.length) {
          messageEl.textContent = "";

          const nextResult = await findNextAvailableDate(
            selectedStaffKey,
            selectedServiceKey,
            currentDate,
            true
          );

          showEmptyState(
            "Fully booked today",
            nextResult
              ? `Next available for ${staff.name} · ${service.label}:`
              : `No available date found for ${staff.name} · ${service.label}.`,
            nextResult
          );

          return;
        }

        messageEl.textContent = "";
        slotCountEl.textContent = `${availabilities.length} openings`;
        slotCardEl.classList.add("is-visible");

        renderSlots(availabilities);

      } catch (error) {
        messageEl.textContent = "Network error: " + error.message;
      }
    }

    function selectBestDefaultStaff() {
      const orderedKeys = getOrderedStaffKeys(currentDate);
      selectedStaffKey = orderedKeys[0];
      selectedServiceKey = STAFF_DATA[selectedStaffKey].defaultService;
    }

    function refreshForDateChange() {
      updateDateUI();

      const orderedKeys = getOrderedStaffKeys(currentDate);

      if (!isWorking(selectedStaffKey, currentDate)) {
        selectedStaffKey = orderedKeys[0];
        selectedServiceKey = STAFF_DATA[selectedStaffKey].defaultService;
      }

      renderStaffStrip();
      renderServicePills();
      updateSelectedStaffRow();
      clearResults();
      searchAvailability();
    }

    prevDayBtn.addEventListener("click", () => {
      currentDate.setDate(currentDate.getDate() - 1);
      refreshForDateChange();
    });

    nextDayBtn.addEventListener("click", () => {
      currentDate.setDate(currentDate.getDate() + 1);
      refreshForDateChange();
    });

    dateInputEl.addEventListener("change", () => {
      if (!dateInputEl.value) return;
      currentDate = fromIsoDateLocal(dateInputEl.value);
      refreshForDateChange();
    });

    nextAvailableBtn.addEventListener("click", () => {
      if (!nextAvailableTargetDate) return;

      currentDate = new Date(nextAvailableTargetDate);
      refreshForDateChange();
    });

    continueBtn.addEventListener("click", () => {
      if (!selectedSlot) {
        alert("Please select a time first.");
        return;
      }

      alert(
        "Next step: customer form.\\n\\nSelected time: " +
        formatPasadenaTime(selectedSlot.start_at)
      );
    });

    updateDateUI();
    selectBestDefaultStaff();
    renderStaffStrip();
    renderServicePills();
    updateSelectedStaffRow();
    searchAvailability();
  </script>
</body>
</html>
